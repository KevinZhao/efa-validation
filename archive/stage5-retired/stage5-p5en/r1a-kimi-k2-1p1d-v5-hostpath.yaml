# Stage 5 · R1a (hostPath) — Kimi-K2-Instruct-0905 (1T MoE, FP8) 1P:1D on 2 × p5en.
# Same as r1a-kimi-k2-1p1d-v5.yaml EXCEPT weights come from each node's local
# /mnt/nvme/models/Kimi-K2-Instruct-0905 (pre-seeded via _prefetch-to-nvme.yaml).
#
# Rationale: cross-AZ FSx Lustre + concurrent mmap of 62 shards × 8 TP ranks
# triggers OST locking + cross-AZ RTT amplification (~1 GB/s aggregate vs 8 GB/s
# Stage-4 local NVMe). Switching to local NVMe hostPath should restore
# Stage-4 cold-start time (~5-7 min weight load).
#
# Prereqs:
#   - 2 p5en nodes ACTIVE with /mnt/nvme RAID0 mounted
#   - _prefetch-to-nvme.yaml DaemonSet has completed on BOTH nodes
#     (/mnt/nvme/models/Kimi-K2-Instruct-0905/.prefetch-complete exists)
#   - ECR image yanxi/sglang-mooncake:v5 reachable in the target region
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sglang-r1a-launcher
  namespace: yanxi-validation
data:
  sglang-launcher.sh: |
    #!/usr/bin/env bash
    set -eu
    ROLE="${ROLE:?need ROLE=prefill|decode|lb}"
    MODEL_PATH="${MODEL_PATH:-/models/Kimi-K2-Instruct-0905}"
    TP="${TP:-8}"
    PORT="${PORT:-30000}"
    BOOTSTRAP_PORT="${BOOTSTRAP_PORT:-8998}"
    CTX_LEN="${CONTEXT_LEN:-131072}"
    MEM_FRAC="${MEM_FRAC_STATIC:-0.92}"
    CHUNKED="${CHUNKED_PREFILL:-4096}"
    KV_BACKEND="${KV_TRANSPORT_BACKEND:-mooncake}"

    TORCH_LIB=$(python3 -c 'import torch, os; print(os.path.join(os.path.dirname(torch.__file__), "lib"))')
    export LD_LIBRARY_PATH="${TORCH_LIB}:${LD_LIBRARY_PATH:-}"
    export FI_PROVIDER="${FI_PROVIDER:-efa}"
    export FI_EFA_USE_DEVICE_RDMA="${FI_EFA_USE_DEVICE_RDMA:-1}"
    export FI_EFA_FORK_SAFE="${FI_EFA_FORK_SAFE:-1}"
    export MOONCAKE_PROTOCOL="${MOONCAKE_PROTOCOL:-rdma}"
    export MOONCAKE_DEVICE="${MOONCAKE_DEVICE:-auto-discovery}"

    IB_DEVICE="${IB_DEVICE:-}"
    if [ -z "${IB_DEVICE}" ] && command -v fi_info >/dev/null 2>&1; then
      IB_DEVICE=$(fi_info -p efa 2>/dev/null | awk '/domain:/ {print $2}' | sed 's/-rdm$//;s/-dgrm$//' | sort -u | paste -sd, -)
    fi
    [ -n "${IB_DEVICE}" ] && echo "[r1a] IB_DEVICE=${IB_DEVICE}"

    # sglang 0.5.10 hardcodes mooncake protocol="rdma" (RC-verbs only). On EFA
    # we need "efa" for Mooncake EfaTransport (libfabric efa provider).
    MC_PY=/usr/local/lib/python3.10/dist-packages/sglang/srt/distributed/device_communicators/mooncake_transfer_engine.py
    if [ -f "${MC_PY}" ] && grep -q '"rdma",' "${MC_PY}"; then
      echo "[r1a] patching ${MC_PY}: rdma -> efa"
      sed -i 's/"rdma",$/"efa",/' "${MC_PY}"
      rm -f /usr/local/lib/python3.10/dist-packages/sglang/srt/distributed/device_communicators/__pycache__/mooncake_transfer_engine.cpython-310.pyc 2>/dev/null || true
    fi

    COMMON_ARGS=(
      --model-path "${MODEL_PATH}"
      --tp "${TP}"
      --host 0.0.0.0 --port "${PORT}"
      --trust-remote-code
      --context-length "${CTX_LEN}"
      --mem-fraction-static "${MEM_FRAC}"
      --chunked-prefill-size "${CHUNKED}"
      --fp8-gemm-backend "${FP8_BACKEND:-cutlass}"
      --skip-server-warmup
    )

    case "${ROLE}" in
      prefill|decode)
        DISAGG_EXTRA=()
        [ -n "${IB_DEVICE}" ] && DISAGG_EXTRA+=(--disaggregation-ib-device "${IB_DEVICE}")
        exec python3 -m sglang.launch_server \
          "${COMMON_ARGS[@]}" \
          --disaggregation-mode "${ROLE}" \
          --disaggregation-transfer-backend "${KV_BACKEND}" \
          --disaggregation-bootstrap-port "${BOOTSTRAP_PORT}" \
          "${DISAGG_EXTRA[@]}"
        ;;
      lb)
        : "${PREFILL_URL:?need PREFILL_URL}"
        : "${DECODE_URL:?need DECODE_URL}"
        LB_PORT="${LB_PORT:-8000}"
        if ! python3 -c "import sglang_router" 2>/dev/null; then
          pip install --no-cache-dir "sglang-router==0.3.2" || exit 3
        fi
        PREFILL_ARGS=()
        for u in ${PREFILL_URL//,/ }; do PREFILL_ARGS+=(--prefill "${u}"); done
        DECODE_ARGS=()
        for u in ${DECODE_URL//,/ }; do DECODE_ARGS+=(--decode "${u}"); done
        exec python3 -m sglang_router.launch_router \
          --pd-disaggregation \
          "${PREFILL_ARGS[@]}" "${DECODE_ARGS[@]}" \
          --host 0.0.0.0 --port "${LB_PORT}"
        ;;
      *) echo "unknown ROLE=${ROLE}"; exit 2 ;;
    esac
---
apiVersion: v1
kind: Service
metadata:
  name: sglang-r1a-prefill
  namespace: yanxi-validation
spec:
  selector: { app: sglang-r1a, role: prefill }
  ports:
    - { name: http, port: 30000, targetPort: 30000 }
    - { name: bootstrap, port: 8998, targetPort: 8998 }
---
apiVersion: v1
kind: Service
metadata:
  name: sglang-r1a-decode
  namespace: yanxi-validation
spec:
  selector: { app: sglang-r1a, role: decode }
  ports:
    - { name: http, port: 30000, targetPort: 30000 }
    - { name: bootstrap, port: 8998, targetPort: 8998 }
---
apiVersion: v1
kind: Service
metadata:
  name: sglang-r1a-lb
  namespace: yanxi-validation
spec:
  selector: { app: sglang-r1a-lb }
  ports:
    - { name: http, port: 8000, targetPort: 8000 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sglang-r1a-prefill
  namespace: yanxi-validation
  labels: { app: sglang-r1a, role: prefill }
spec:
  replicas: 1
  selector: { matchLabels: { app: sglang-r1a, role: prefill } }
  template:
    metadata:
      labels: { app: sglang-r1a, role: prefill }
    spec:
      tolerations:
        - { key: nvidia.com/gpu, operator: Equal, value: "true", effect: NoSchedule }
      nodeSelector: { node.kubernetes.io/instance-type: p5en.48xlarge }
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector: { matchLabels: { app: sglang-r1a } }
              topologyKey: kubernetes.io/hostname
      containers:
        - name: server
          image: 788668107894.dkr.ecr.us-east-2.amazonaws.com/yanxi/sglang-mooncake:v5
          imagePullPolicy: IfNotPresent
          env:
            - { name: ROLE, value: "prefill" }
            - { name: MODEL_PATH, value: "/models/Kimi-K2-Instruct-0905" }
            - { name: TP, value: "8" }
            - { name: CONTEXT_LEN, value: "131072" }
            - { name: MEM_FRAC_STATIC, value: "0.92" }
            - { name: CHUNKED_PREFILL, value: "4096" }
            - { name: KV_TRANSPORT_BACKEND, value: "mooncake" }
            - { name: MC_WORKERS_PER_CTX, value: "2" }
            - { name: MC_NUM_CQ_PER_CTX, value: "2" }
          command: ["/bin/bash", "-lc"]
          args: ["exec /scripts/sglang-launcher.sh"]
          readinessProbe:
            httpGet: { path: /get_model_info, port: 30000 }
            initialDelaySeconds: 240
            periodSeconds: 10
            failureThreshold: 120
          ports:
            - { containerPort: 30000, name: http }
            - { containerPort: 8998, name: bootstrap }
          securityContext: { capabilities: { add: [IPC_LOCK] } }
          resources:
            limits:   { nvidia.com/gpu: 8, vpc.amazonaws.com/efa: 16, hugepages-2Mi: 5120Mi, memory: 500Gi }
            requests: { nvidia.com/gpu: 8, vpc.amazonaws.com/efa: 16, hugepages-2Mi: 5120Mi, memory: 500Gi }
          volumeMounts:
            - { name: models, mountPath: /models }
            - { name: shm,    mountPath: /dev/shm }
            - { name: scripts, mountPath: /scripts }
      volumes:
        - name: models
          hostPath: { path: /mnt/nvme/models, type: Directory }
        - name: shm
          emptyDir: { medium: Memory, sizeLimit: 64Gi }
        - name: scripts
          configMap: { name: sglang-r1a-launcher, defaultMode: 0755 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sglang-r1a-decode
  namespace: yanxi-validation
  labels: { app: sglang-r1a, role: decode }
spec:
  replicas: 1
  selector: { matchLabels: { app: sglang-r1a, role: decode } }
  template:
    metadata:
      labels: { app: sglang-r1a, role: decode }
    spec:
      tolerations:
        - { key: nvidia.com/gpu, operator: Equal, value: "true", effect: NoSchedule }
      nodeSelector: { node.kubernetes.io/instance-type: p5en.48xlarge }
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector: { matchLabels: { app: sglang-r1a } }
              topologyKey: kubernetes.io/hostname
      containers:
        - name: server
          image: 788668107894.dkr.ecr.us-east-2.amazonaws.com/yanxi/sglang-mooncake:v5
          imagePullPolicy: IfNotPresent
          env:
            - { name: ROLE, value: "decode" }
            - { name: MODEL_PATH, value: "/models/Kimi-K2-Instruct-0905" }
            - { name: TP, value: "8" }
            - { name: CONTEXT_LEN, value: "131072" }
            - { name: MEM_FRAC_STATIC, value: "0.92" }
            - { name: CHUNKED_PREFILL, value: "4096" }
            - { name: KV_TRANSPORT_BACKEND, value: "mooncake" }
            - { name: MC_WORKERS_PER_CTX, value: "2" }
            - { name: MC_NUM_CQ_PER_CTX, value: "2" }
          command: ["/bin/bash", "-lc"]
          args: ["exec /scripts/sglang-launcher.sh"]
          readinessProbe:
            httpGet: { path: /get_model_info, port: 30000 }
            initialDelaySeconds: 240
            periodSeconds: 10
            failureThreshold: 120
          ports:
            - { containerPort: 30000, name: http }
            - { containerPort: 8998, name: bootstrap }
          securityContext: { capabilities: { add: [IPC_LOCK] } }
          resources:
            limits:   { nvidia.com/gpu: 8, vpc.amazonaws.com/efa: 16, hugepages-2Mi: 5120Mi, memory: 500Gi }
            requests: { nvidia.com/gpu: 8, vpc.amazonaws.com/efa: 16, hugepages-2Mi: 5120Mi, memory: 500Gi }
          volumeMounts:
            - { name: models, mountPath: /models }
            - { name: shm,    mountPath: /dev/shm }
            - { name: scripts, mountPath: /scripts }
      volumes:
        - name: models
          hostPath: { path: /mnt/nvme/models, type: Directory }
        - name: shm
          emptyDir: { medium: Memory, sizeLimit: 64Gi }
        - name: scripts
          configMap: { name: sglang-r1a-launcher, defaultMode: 0755 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sglang-r1a-lb
  namespace: yanxi-validation
  labels: { app: sglang-r1a-lb }
spec:
  replicas: 1
  selector: { matchLabels: { app: sglang-r1a-lb } }
  template:
    metadata:
      labels: { app: sglang-r1a-lb }
    spec:
      tolerations:
        - { key: nvidia.com/gpu, operator: Equal, value: "true", effect: NoSchedule }
      containers:
        - name: lb
          image: 788668107894.dkr.ecr.us-east-2.amazonaws.com/yanxi/sglang-mooncake:v5
          imagePullPolicy: IfNotPresent
          env:
            - { name: ROLE, value: "lb" }
            - { name: PREFILL_URL, value: "http://sglang-r1a-prefill.yanxi-validation.svc:30000" }
            - { name: DECODE_URL,  value: "http://sglang-r1a-decode.yanxi-validation.svc:30000" }
          command: ["/bin/bash", "-lc"]
          args: ["exec /scripts/sglang-launcher.sh"]
          ports:
            - { containerPort: 8000, name: http }
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          volumeMounts:
            - { name: scripts, mountPath: /scripts }
      volumes:
        - name: scripts
          configMap: { name: sglang-r1a-launcher, defaultMode: 0755 }
