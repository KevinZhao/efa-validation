# R6 B300 preflight — single-node pod verifies:
#  - torch.cuda.get_arch_list() contains sm_100 / sm_103 (B300 Blackwell)
#  - GPU visible and sm_arch matches hardware
#  - Mooncake + SGLang import cleanly on B300
#  - /data mount is present (auto-LVM from userdata)
#  - EFA provider shows 16 NICs with libfabric
#
# Runs on single B300 node in usw2-az2. Apply from Oregon bastion.
apiVersion: v1
kind: Pod
metadata:
  name: r6-b300-preflight
  namespace: yanxi-validation
  labels: { app: r6-b300-preflight }
spec:
  restartPolicy: Never
  tolerations:
    - { key: nvidia.com/gpu, operator: Equal, value: "true", effect: NoSchedule }
  nodeSelector:
    node.kubernetes.io/instance-type: p6-b300.48xlarge
    topology.kubernetes.io/zone: us-west-2b
  containers:
    - name: preflight
      image: 788668107894.dkr.ecr.us-west-2.amazonaws.com/yanxi/sglang-mooncake:v5
      imagePullPolicy: IfNotPresent
      command: ["/bin/bash", "-lc"]
      args:
        - |
          set -eu
          echo "=== R6 B300 preflight ==="
          echo ""
          echo "[1/6] nvidia-smi"
          nvidia-smi --query-gpu=index,name,compute_cap,memory.total --format=csv
          echo ""
          echo "[2/6] torch CUDA + arch_list"
          python3 -c "import torch; print('torch:', torch.__version__); print('cuda:', torch.version.cuda); print('arch_list:', torch.cuda.get_arch_list()); print('device_count:', torch.cuda.device_count()); print('device_name_0:', torch.cuda.get_device_name(0)); print('device_cap_0:', torch.cuda.get_device_capability(0))"
          echo ""
          echo "[3/6] Mooncake import"
          python3 -c "import mooncake; print('mooncake ok:', dir(mooncake)[:10])"
          echo ""
          echo "[4/6] sglang import"
          python3 -c "import sglang; print('sglang:', sglang.__version__)"
          echo ""
          echo "[5/6] /data mount + fi_info"
          df -h /data || echo "NO /data"
          ls -la /data 2>&1 | head -5 || true
          fi_info -p efa 2>&1 | head -30 || echo "fi_info failed"
          echo ""
          echo "[6/6] Simple CUDA kernel launch on GPU 0"
          python3 -c "import torch; x = torch.randn(1024, 1024, device='cuda:0'); y = x @ x; torch.cuda.synchronize(); print('matmul ok, result sum:', y.sum().item())"
          echo ""
          echo "=== PREFLIGHT DONE ==="
      resources:
        limits: { nvidia.com/gpu: 1, memory: 16Gi }
        requests: { nvidia.com/gpu: 1, memory: 16Gi }
      volumeMounts:
        - { name: data, mountPath: /data }
  volumes:
    - name: data
      hostPath: { path: /data, type: DirectoryOrCreate }
