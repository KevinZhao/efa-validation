# =============================================================================
# Stage 4 (b) — SGLang PD 分离 · Decode 实例 · TP=8 单节点
# 1 Leader + 0 Worker（LWS size=1）；独占第 2 个 p5.48xlarge。
# 从 sglang-prefill-svc（Mooncake EfaTransport）拉 KV。
# OpenAI 兼容 HTTP 通过 sglang-decode-svc 对外暴露，供 bench_serving Job 发压。
# =============================================================================
apiVersion: leaderworkerset.x-k8s.io/v1
kind: LeaderWorkerSet
metadata:
  name: sglang-decode
  namespace: yanxi-validation
  labels:
    app: sglang
    role: decode
    stage: stage4-e2e
spec:
  replicas: 1
  leaderWorkerTemplate:
    size: 1
    restartPolicy: RecreateGroupOnPodRestart
    leaderTemplate:
      metadata:
        labels:
          app: sglang
          role: decode
      spec:
        serviceAccountName: yanxi-runner
        restartPolicy: Never
        terminationGracePeriodSeconds: 60
        hostIPC: true
        tolerations:
          - key: nvidia.com/gpu
            operator: Equal
            value: "true"
            effect: NoSchedule
        affinity:
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: ["sglang"]
                topologyKey: kubernetes.io/hostname
        containers:
          - name: decode
            # TODO: 阶段开始前确认 tag 已推到 ECR
            image: 788668107894.dkr.ecr.us-east-2.amazonaws.com/yanxi/sglang-mooncake:v1
            imagePullPolicy: IfNotPresent
            securityContext:
              capabilities:
                add: [IPC_LOCK]
            ports:
              - name: http
                containerPort: 30000
              - name: mooncake
                containerPort: 18000
            env:
              - name: MODEL
                value: "jdopensource/JoyAI-LLM-Flash"
              - name: ROLE
                value: "decode"
              - name: TP_SIZE
                value: "8"
              # ---- EFA + NCCL + OMPI ----
              - name: FI_PROVIDER
                value: "efa"
              - name: FI_EFA_USE_DEVICE_RDMA
                value: "1"
              - name: FI_EFA_FORK_SAFE
                value: "1"
              - name: NCCL_NET_PLUGIN
                value: "/opt/aws-ofi-nccl/lib/libnccl-net.so"
              - name: NCCL_DEBUG
                value: "WARN"
              - name: NCCL_PROTO
                value: "simple"
              - name: NCCL_ALGO
                value: "ring"
              - name: NCCL_IB_DISABLE
                value: "0"
              - name: NCCL_SOCKET_IFNAME
                value: "eth0"
              - name: OMPI_ALLOW_RUN_AS_ROOT
                value: "1"
              - name: OMPI_ALLOW_RUN_AS_ROOT_CONFIRM
                value: "1"
              - name: LD_LIBRARY_PATH
                value: "/opt/mooncake/install/lib:/opt/amazon/efa/lib:/opt/amazon/openmpi/lib:/opt/aws-ofi-nccl/lib:/usr/local/cuda/lib64:/usr/local/lib:/usr/lib"
              - name: PATH
                value: "/opt/amazon/efa/bin:/opt/amazon/openmpi/bin:/usr/local/cuda/bin:/usr/local/bin:/usr/bin:/bin"
              # ---- Mooncake：Decode 侧作为 KV 消费者，指向 Prefill Service ----
              - name: MOONCAKE_TRANSPORT
                value: "efa"
              - name: MOONCAKE_DEVICE_NAME
                value: "efa"
              - name: MOONCAKE_LOCAL_HOSTNAME
                valueFrom:
                  fieldRef:
                    fieldPath: status.podIP
              - name: MOONCAKE_MASTER_SERVER
                value: "sglang-prefill-svc.yanxi-validation.svc.cluster.local:18000"
              # ---- SGLang disaggregation handshake ----
              # Decode 通过 Prefill 的 bootstrap port 拿路由信息
              - name: DISAGG_PREFILL_HOST
                value: "sglang-prefill-svc.yanxi-validation.svc.cluster.local"
              - name: DISAGG_PREFILL_PORT
                value: "8998"
              - name: PYTHONUNBUFFERED
                value: "1"
              - name: HF_HUB_ENABLE_HF_TRANSFER
                value: "1"
            command:
              - /bin/bash
              - -lc
              - |
                set -euxo pipefail
                nvidia-smi
                fi_info -p efa || true
                echo "MODEL=$MODEL  ROLE=$ROLE  TP=$TP_SIZE"

                # 等 Prefill 启好再拉 KV（避免 Mooncake 握手失败）
                until curl -sf "http://sglang-prefill-svc.yanxi-validation.svc.cluster.local:30000/health"; do
                  echo "waiting for prefill /health ..."; sleep 10
                done

                # TODO: SGLang disaggregation CLI 对应参数名以 main 为准：
                #   --disaggregation-mode decode
                #   --disaggregation-transfer-backend mooncake
                #   --disaggregation-prefill-addr <host:port>
                python3 -m sglang.launch_server \
                  --model-path "$MODEL" \
                  --trust-remote-code \
                  --host 0.0.0.0 \
                  --port 30000 \
                  --tp-size "$TP_SIZE" \
                  --disaggregation-mode decode \
                  --disaggregation-transfer-backend mooncake \
                  --disaggregation-prefill-addr "$DISAGG_PREFILL_HOST:$DISAGG_PREFILL_PORT" \
                  --mem-fraction-static 0.85 \
                  --enable-metrics \
                  --log-level info \
                  2>&1 | tee /results/decode.log
            resources:
              limits:
                nvidia.com/gpu: 8
                vpc.amazonaws.com/efa: 16
                hugepages-2Mi: 5120Mi
                memory: 1Ti
              requests:
                nvidia.com/gpu: 8
                vpc.amazonaws.com/efa: 16
                hugepages-2Mi: 5120Mi
                memory: 1Ti
            readinessProbe:
              httpGet:
                path: /health
                port: http
              initialDelaySeconds: 240
              periodSeconds: 10
              failureThreshold: 60
            livenessProbe:
              httpGet:
                path: /health
                port: http
              initialDelaySeconds: 900
              periodSeconds: 30
              failureThreshold: 5
            volumeMounts:
              - name: shm
                mountPath: /dev/shm
              - name: hugepage
                mountPath: /hugepages-2Mi
              - name: models
                mountPath: /models
              - name: results
                mountPath: /results
        volumes:
          - name: shm
            emptyDir:
              medium: Memory
              sizeLimit: 32Gi
          - name: hugepage
            emptyDir:
              medium: HugePages-2Mi
          # TODO: 阶段开始前换 FSx PVC（ReadWriteMany），预热 jdopensource/JoyAI-LLM-Flash
          - name: models
            emptyDir:
              sizeLimit: 200Gi
          # TODO: 阶段开始前换 PVC
          - name: results
            emptyDir:
              sizeLimit: 50Gi
---
# Decode 暴露：OpenAI 兼容 HTTP，对外发压入口
apiVersion: v1
kind: Service
metadata:
  name: sglang-decode-svc
  namespace: yanxi-validation
  labels:
    app: sglang
    role: decode
spec:
  type: ClusterIP
  selector:
    app: sglang
    role: decode
    leaderworkerset.sigs.k8s.io/worker-index: "0"
  ports:
    - name: http
      port: 30000
      targetPort: http
    - name: mooncake
      port: 18000
      targetPort: mooncake
