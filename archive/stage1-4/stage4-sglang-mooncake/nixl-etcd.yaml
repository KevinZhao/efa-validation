apiVersion: v1
kind: Service
metadata:
  name: nixl-etcd
  namespace: yanxi-validation
spec:
  selector:
    app: nixl-etcd
  ports:
    - name: client
      port: 2379
      targetPort: 2379
    - name: peer
      port: 2380
      targetPort: 2380
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nixl-etcd
  namespace: yanxi-validation
  labels: { app: nixl-etcd }
spec:
  replicas: 1
  selector:
    matchLabels: { app: nixl-etcd }
  template:
    metadata:
      labels: { app: nixl-etcd }
    spec:
      tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      nodeSelector:
        node.kubernetes.io/instance-type: p5en.48xlarge
      containers:
        - name: etcd
          image: 788668107894.dkr.ecr.us-east-2.amazonaws.com/yanxi/sglang-mooncake:v1
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "-lc"]
          args:
            - |
              set -eux
              # Prefer locally-installed etcd; fallback to static binary
              if ! which etcd >/dev/null 2>&1; then
                cd /tmp
                if [ ! -f etcd-v3.5.13-linux-amd64.tar.gz ]; then
                  curl -sL https://github.com/etcd-io/etcd/releases/download/v3.5.13/etcd-v3.5.13-linux-amd64.tar.gz -o etcd-v3.5.13-linux-amd64.tar.gz
                fi
                tar xzf etcd-v3.5.13-linux-amd64.tar.gz
                cp etcd-v3.5.13-linux-amd64/etcd /usr/local/bin/etcd
              fi
              etcd --version
              exec etcd \
                --name nixl-etcd \
                --listen-client-urls http://0.0.0.0:2379 \
                --advertise-client-urls http://0.0.0.0:2379 \
                --listen-peer-urls http://0.0.0.0:2380 \
                --data-dir /tmp/etcd-data
          ports:
            - { containerPort: 2379, name: client }
            - { containerPort: 2380, name: peer }
          resources:
            limits: { cpu: "2", memory: 2Gi }
            requests: { cpu: "500m", memory: 512Mi }
