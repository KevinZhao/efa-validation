# Stage 4 p5en — 1P:2D bench sweep (3 rates × 128 prompts each)
# Must be applied after disagg-1p2d.yaml succeeds smoke test.
apiVersion: batch/v1
kind: Job
metadata:
  name: sglang-bench-1p2d
  namespace: yanxi-validation
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 7200
  template:
    spec:
      restartPolicy: Never
      tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      nodeSelector:
        node.kubernetes.io/instance-type: p5en.48xlarge
      containers:
        - name: bench
          image: 788668107894.dkr.ecr.us-east-2.amazonaws.com/yanxi/sglang-mooncake:v2
          imagePullPolicy: IfNotPresent
          env:
            - name: TARGET_HOST
              value: "sglang-lb.yanxi-validation.svc"
            - name: TARGET_PORT
              value: "8000"
            - name: MODEL
              value: "/models/current"
          command: ["/bin/bash", "-lc"]
          args:
            - |
              set -eu
              mkdir -p /results
              # Wait for LB readiness.
              for i in $(seq 1 60); do
                CODE=$(curl -o /dev/null -s -w "%{http_code}" http://${TARGET_HOST}:${TARGET_PORT}/v1/models 2>/dev/null || echo 000)
                echo "wait lb attempt=$i code=$CODE"
                [ "$CODE" = "200" ] && break
                sleep 5
              done
              # 3 rates — keep sweep compact (we have 128 prompts × 3 = ~5 min total).
              for RATE in 4 8 16; do
                echo "====== rate=${RATE} ======"
                python3 -m sglang.bench_serving \
                  --backend sglang-oai-chat \
                  --host "${TARGET_HOST}" --port "${TARGET_PORT}" \
                  --model "${MODEL}" \
                  --tokenizer "${MODEL}" \
                  --num-prompts 128 \
                  --dataset-name random \
                  --random-input-len 1024 \
                  --random-output-len 256 \
                  --request-rate "${RATE}" \
                  --pd-separated \
                  --output-file /results/bench-1p2d-r${RATE}.json \
                  2>&1 | tee /results/bench-1p2d-r${RATE}.log
              done
              echo "=== DONE ALL SWEEPS ==="
              ls -la /results/
              echo "=========== SUMMARY ==========="
              for RATE in 4 8 16; do
                echo "--- rate=${RATE} ---"
                grep -E "Mean TTFT|Median TTFT|Mean TPOT|Mean ITL|Output token throughput|Successful|request rate" /results/bench-1p2d-r${RATE}.log || true
              done
          volumeMounts:
            - name: results
              mountPath: /results
            - name: models
              mountPath: /models
      volumes:
        - name: results
          emptyDir: {}
        - name: models
          hostPath:
            path: /var/lib/yanxi-models
            type: Directory
