apiVersion: kubeflow.org/v2beta1
kind: MPIJob
metadata:
  name: nccl-tests-efa
  namespace: efa-validation
spec:
  slotsPerWorker: 8
  runPolicy:
    cleanPodPolicy: Running
    ttlSecondsAfterFinished: 3600
  sshAuthMountPath: /root/.ssh
  mpiReplicaSpecs:
    Launcher:
      replicas: 1
      template:
        spec:
          serviceAccountName: efa-runner
          restartPolicy: Never
          tolerations:
            - key: nvidia.com/gpu
              operator: Equal
              value: "true"
              effect: NoSchedule
          nodeSelector:
            node.kubernetes.io/instance-type: p5.48xlarge
          containers:
            - name: launcher
              image: <AWS_ACCOUNT_ID>.dkr.ecr.us-east-2.amazonaws.com/efa-validation/nccl-tests:v2
              imagePullPolicy: IfNotPresent
              env:
                - name: NCCL_DEBUG
                  value: "INFO"
                - name: NCCL_DEBUG_SUBSYS
                  value: "INIT,NET,ENV"
              command:
                - /bin/bash
                - -lc
                - |
                  set -eux
                  echo "===== nccl-tests launcher ready ====="
                  cat /etc/mpi/discover_hosts.sh || true

                  # Wait for workers to appear in discover_hosts.sh
                  for i in $(seq 1 60); do
                    HOSTS=$(/etc/mpi/discover_hosts.sh 2>/dev/null | paste -sd, -)
                    NH=$(/etc/mpi/discover_hosts.sh 2>/dev/null | wc -l)
                    echo "attempt=$i hosts_count=$NH hosts=$HOSTS"
                    [ "$NH" -ge 2 ] && break
                    sleep 5
                  done

                  if [ "$NH" -lt 2 ]; then
                    echo "FATAL: workers not discovered after 5 minutes"
                    exit 1
                  fi

                  # Build hostfile with explicit slots=8
                  HOSTFILE=/tmp/hostfile
                  : > $HOSTFILE
                  for h in $(/etc/mpi/discover_hosts.sh); do
                    echo "$h slots=8" >> $HOSTFILE
                  done
                  echo "--- hostfile ---"
                  cat $HOSTFILE

                  # Validate ssh connectivity to each worker
                  for h in $(/etc/mpi/discover_hosts.sh); do
                    for i in $(seq 1 30); do
                      if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=2 "$h" hostname 2>/dev/null; then
                        echo "ssh OK: $h"
                        break
                      fi
                      sleep 2
                    done
                  done

                  ENV_ARGS=(
                    -x PATH -x LD_LIBRARY_PATH
                    -x NCCL_DEBUG -x NCCL_DEBUG_SUBSYS
                    -x FI_PROVIDER -x FI_EFA_USE_DEVICE_RDMA -x FI_EFA_FORK_SAFE
                    -x NCCL_NET_PLUGIN
                    -x OMPI_ALLOW_RUN_AS_ROOT -x OMPI_ALLOW_RUN_AS_ROOT_CONFIRM
                  )

                  # Make sure worker nodes can reach us by our pod DNS name.
                  # MPI Operator creates a headless Service, but the launcher pod name
                  # in DNS is NOT the suffix-bearing "nccl-tests-efa-launcher-xxxxx".
                  # Force orte to bind/advertise using eth0 IP, bypassing DNS reverse.
                  MY_IP=$(hostname -i | awk '{print $1}')
                  echo "launcher IP=$MY_IP"

                  MPI_COMMON=(
                    --allow-run-as-root
                    --hostfile "$HOSTFILE"
                    -np 16 -N 8
                    --mca pml ^ucx --mca btl ^openib
                    --mca plm_rsh_no_tree_spawn 1
                    --mca orte_keep_fqdn_hostnames 1
                    --mca oob_tcp_if_include eth0
                    --mca btl_tcp_if_include eth0
                    --bind-to none
                    "${ENV_ARGS[@]}"
                  )

                  echo "===== all_reduce_perf 8KB..8GB ====="
                  mpirun "${MPI_COMMON[@]}" \
                    /opt/nccl-tests/build/all_reduce_perf -b 8K -e 8G -f 2 -g 1 -c 1 -n 20 -w 5 | tee /tmp/all_reduce.log

                  echo "===== all_to_all_perf 8KB..4GB ====="
                  mpirun "${MPI_COMMON[@]}" \
                    /opt/nccl-tests/build/alltoall_perf -b 8K -e 4G -f 2 -g 1 -c 1 -n 20 -w 5 | tee /tmp/alltoall.log

                  echo "===== DONE ====="
    Worker:
      replicas: 2
      template:
        spec:
          restartPolicy: OnFailure
          hostNetwork: false
          dnsPolicy: ClusterFirstWithHostNet
          tolerations:
            - key: nvidia.com/gpu
              operator: Equal
              value: "true"
              effect: NoSchedule
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      training.kubeflow.org/job-name: nccl-tests-efa
                      training.kubeflow.org/job-role: worker
                  topologyKey: kubernetes.io/hostname
          containers:
            - name: worker
              image: <AWS_ACCOUNT_ID>.dkr.ecr.us-east-2.amazonaws.com/efa-validation/nccl-tests:v2
              imagePullPolicy: IfNotPresent
              securityContext:
                capabilities:
                  add: [IPC_LOCK]
              resources:
                limits:
                  nvidia.com/gpu: 8
                  vpc.amazonaws.com/efa: 32
                  hugepages-2Mi: 5120Mi
                  memory: 256Gi
                requests:
                  nvidia.com/gpu: 8
                  vpc.amazonaws.com/efa: 32
                  hugepages-2Mi: 5120Mi
                  memory: 256Gi
              volumeMounts:
                - name: shm
                  mountPath: /dev/shm
          volumes:
            - name: shm
              emptyDir:
                medium: Memory
                sizeLimit: 32Gi
