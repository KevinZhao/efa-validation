apiVersion: v1
kind: Pod
metadata:
  name: gpu-smoke-cdi
  namespace: yanxi-validation
  annotations:
    cdi.k8s.io/gpu: "nvidia.com/gpu=all"
spec:
  tolerations:
    - key: nvidia.com/gpu
      operator: Equal
      value: "true"
      effect: NoSchedule
  nodeSelector:
    node.kubernetes.io/instance-type: p5.48xlarge
  restartPolicy: Never
  containers:
    - name: gpu-smoke
      image: nvidia/cuda:12.6.2-base-ubuntu22.04
      command: ["bash", "-c"]
      args:
        - |
          set +e
          echo "=== /dev/nvidia* ==="
          ls /dev/nvidia* 2>&1 | head -20
          echo "=== nvidia-smi ==="
          nvidia-smi || echo nvidia-smi_failed
          sleep 120
      resources:
        limits:
          nvidia.com/gpu: 1
        requests:
          nvidia.com/gpu: 1
