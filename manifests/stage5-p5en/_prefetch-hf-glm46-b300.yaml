# R6 B300 prefetch — GLM-4.6-FP8 to /data on 2 B300 nodes (usw2-az2 only).
# Same content as _prefetch-hf-glm46-oregon.yaml but:
#   - nodeSelector p6-b300.48xlarge
#   - completions/parallelism=2
#   - topology.kubernetes.io/zone=us-west-2b (hard same-AZ rule)
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: glm46-prefetch-hf-b300-script
  namespace: yanxi-validation
data:
  prefetch.sh: |
    #!/usr/bin/env bash
    set -eux
    MODEL_ID="${MODEL_ID:-zai-org/GLM-4.6-FP8}"
    DEST="${DEST:-/data/models/GLM-4.6-FP8}"
    SENTINEL="$DEST/.nvme-prefetch-done"
    if [ -f "$SENTINEL" ]; then
      echo "$(date -u +%FT%TZ) already complete at $DEST"; du -sh "$DEST"; exit 0
    fi
    mkdir -p "$DEST"
    export HF_HUB_ENABLE_HF_TRANSFER=1
    export HF_HOME=/data/.hf-cache
    mkdir -p "$HF_HOME"
    echo "$(date -u +%FT%TZ) starting hf download $MODEL_ID -> $DEST"
    if command -v hf >/dev/null 2>&1; then
      time hf download "$MODEL_ID" --local-dir "$DEST" --max-workers 16
    else
      time huggingface-cli download "$MODEL_ID" --local-dir "$DEST" --local-dir-use-symlinks False --max-workers 16
    fi
    touch "$SENTINEL"
    echo "$(date -u +%FT%TZ) done"
    du -sh "$DEST"; ls "$DEST" | wc -l
---
apiVersion: batch/v1
kind: Job
metadata:
  name: glm46-prefetch-hf-b300
  namespace: yanxi-validation
spec:
  backoffLimit: 3
  completions: 2
  parallelism: 2
  completionMode: Indexed
  template:
    metadata:
      labels: { app: glm46-prefetch-hf-b300 }
    spec:
      restartPolicy: Never
      tolerations:
        - { key: nvidia.com/gpu, operator: Equal, value: "true", effect: NoSchedule }
      nodeSelector:
        node.kubernetes.io/instance-type: p6-b300.48xlarge
        topology.kubernetes.io/zone: us-west-2b
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector: { matchLabels: { app: glm46-prefetch-hf-b300 } }
      containers:
        - name: prefetch
          image: 788668107894.dkr.ecr.us-west-2.amazonaws.com/yanxi/sglang-mooncake:v5
          imagePullPolicy: IfNotPresent
          env:
            - { name: MODEL_ID, value: "zai-org/GLM-4.6-FP8" }
            - { name: DEST,     value: "/data/models/GLM-4.6-FP8" }
          command: ["/bin/bash", "/scripts/prefetch.sh"]
          volumeMounts:
            - { name: local-data, mountPath: /data }
            - { name: scripts,    mountPath: /scripts }
          resources:
            requests: { cpu: "8", memory: "16Gi" }
            limits:   { cpu: "32", memory: "64Gi" }
      volumes:
        - name: local-data
          hostPath: { path: /data, type: Directory }
        - name: scripts
          configMap:
            name: glm46-prefetch-hf-b300-script
            defaultMode: 0755
