---
# ==== Router (sglang-router LB) ====
apiVersion: apps/v1
kind: Deployment
metadata:
  name: c1p1d-lb
  namespace: yanxi-validation
  labels: { app: c1p1d-lb }
spec:
  replicas: 1
  selector: { matchLabels: { app: c1p1d-lb } }
  template:
    metadata:
      labels: { app: c1p1d-lb }
    spec:
      tolerations:
        - { key: nvidia.com/gpu, operator: Equal, value: "true", effect: NoSchedule }
      containers:
        - name: lb
          image: 788668107894.dkr.ecr.us-east-2.amazonaws.com/yanxi/sglang-mooncake-nixl-uccl:2026.04.30-h200.6
          imagePullPolicy: IfNotPresent
          env:
            - { name: ROLE, value: "lb" }
            - { name: PREFILL_URL, value: "http://c1p1d-prefill.yanxi-validation.svc:30000" }
            - { name: DECODE_URL,  value: "http://c1p1d-decode.yanxi-validation.svc:30000" }
          command: ["/bin/bash", "-lc"]
          args: ["exec /scripts/sglang-launcher.sh"]
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          ports:
            - { containerPort: 8000, name: http }
          volumeMounts:
            - { name: scripts, mountPath: /scripts }
      volumes:
        - name: scripts
          configMap: { name: pd-1p1d-mc-vs-nixl-k25-launcher, defaultMode: 0755 }
