          env:
            - { name: ROLE, value: "decode" }
            - { name: MODEL_PATH, value: "/models/moonshotai/Kimi-K2.5" }
            - { name: TP, value: "8" }
            - { name: CONTEXT_LEN, value: "262144" }
            - { name: MEM_FRAC_STATIC, value: "0.85" }
            - { name: KV_BACKEND, value: "${KV_BACKEND}" }

            # --- NIXL plugin fix: sglang reads SGLANG_DISAGGREGATION_NIXL_BACKEND
