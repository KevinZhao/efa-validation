apiVersion: apps/v1
kind: Deployment
metadata:
  name: sglang-r1b-lb
  namespace: yanxi-validation
  labels:
    app: sglang-r1b-lb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sglang-r1b-lb
  template:
    metadata:
      labels:
        app: sglang-r1b-lb
    spec:
      tolerations:
      - key: nvidia.com/gpu
        operator: Equal
        value: 'true'
        effect: NoSchedule
      containers:
      - name: lb
        image: 788668107894.dkr.ecr.us-east-2.amazonaws.com/yanxi/sglang-mooncake:v5
        imagePullPolicy: IfNotPresent
        env:
        - name: ROLE
          value: lb
        - name: PREFILL_URL
          value: http://sglang-r1b-prefill.yanxi-validation.svc:30000
        - name: DECODE_URL
          value: http://sglang-r1b-decode-0.yanxi-validation.svc:30000,http://sglang-r1b-decode-1.yanxi-validation.svc:30000
        command:
        - /bin/bash
        - -lc
        args:
        - exec /scripts/sglang-launcher.sh
        ports:
        - containerPort: 8000
          name: http
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 30
        volumeMounts:
        - name: scripts
          mountPath: /scripts
      volumes:
      - name: scripts
        configMap:
          name: sglang-r1b-launcher
          defaultMode: 493
      nodeSelector:
        topology.kubernetes.io/zone: us-east-2b
