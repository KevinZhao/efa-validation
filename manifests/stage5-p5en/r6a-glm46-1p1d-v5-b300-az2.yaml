---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sglang-r6a-lb
  namespace: yanxi-validation
  labels: { app: sglang-r6a-lb }
spec:
  replicas: 1
  selector: { matchLabels: { app: sglang-r6a-lb } }
  template:
    metadata:
      labels: { app: sglang-r6a-lb }
    spec:
      nodeSelector:
        topology.kubernetes.io/zone: us-west-2b
      tolerations:
        - { key: nvidia.com/gpu, operator: Equal, value: "true", effect: NoSchedule }
      containers:
        - name: lb
          image: 788668107894.dkr.ecr.us-west-2.amazonaws.com/yanxi/sglang-mooncake:v5
          imagePullPolicy: IfNotPresent
          env:
            - { name: ROLE,         value: "lb" }
            - { name: PREFILL_URL,  value: "http://sglang-r6a-prefill.yanxi-validation.svc:30000" }
            - { name: DECODE_URL,   value: "http://sglang-r6a-decode-0.yanxi-validation.svc:30000" }
          command: ["/bin/bash", "-lc"]
          args: ["exec /scripts/sglang-launcher.sh"]
          ports:
            - { containerPort: 8000, name: http }
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          volumeMounts:
            - { name: scripts, mountPath: /scripts }
      volumes:
        - name: scripts
          configMap: { name: sglang-r6a-launcher, defaultMode: 0755 }
