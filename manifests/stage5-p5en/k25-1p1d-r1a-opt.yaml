          image: public.ecr.aws/amazonlinux/amazonlinux:2023
          command: ["/bin/bash","-lc","dnf install -y -q tar gzip awscli; exec /scripts/prefetch.sh"]
          env:
            - { name: MODEL_ID, value: "moonshotai/Kimi-K2.5" }
            - { name: S3_BUCKET, value: "yanxi-validation-788668107894-oregon" }
            - { name: S3_REGION, value: "us-west-2" }
          volumeMounts:
            - { name: local-nvme, mountPath: /host-nvme }
            - { name: scripts, mountPath: /scripts }
          resources:
            requests: { cpu: "4", memory: "8Gi" }
            limits:   { cpu: "32", memory: "64Gi" }
      containers:
        - name: server
