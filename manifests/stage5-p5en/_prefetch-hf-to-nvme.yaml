# Prefetch Kimi-K2 from HuggingFace Hub directly to each p5en node's local NVMe.
# Uses hf_transfer multi-threaded downloader (Stage-4-proven: ~1-2 GB/s per node).
# Runs on BOTH nodes in parallel via a Job with completions=2/parallelism=2 +
# topologySpread hostname anti-affinity to guarantee one pod per node.
#
# Why HF instead of FSx rsync: cross-AZ FSx Lustre hits ~30 MB/s per pod for
# sequential large-file reads under our workload pattern, which would need 8+
# hours per node. Direct HF download over NAT gateway is both faster and
# trivially parallel across nodes (no shared-source contention).
#
# NOTE: sglang-mooncake:v5 image already has the `hf` CLI + hf_transfer.
# HF_TOKEN is taken from a secret if gated (Kimi-K2-Instruct-0905 is public, so
# HF_TOKEN is optional but supplied if present).
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kimi-k2-prefetch-hf-script
  namespace: yanxi-validation
data:
  prefetch.sh: |
    #!/usr/bin/env bash
    set -eux
    MODEL_ID="${MODEL_ID:-moonshotai/Kimi-K2-Instruct-0905}"
    DEST="${DEST:-/host-nvme/models/Kimi-K2-Instruct-0905}"
    SENTINEL="$DEST/.nvme-prefetch-done"

    if [ -f "$SENTINEL" ]; then
      echo "$(date -u +%FT%TZ) [$(hostname)] already complete at $DEST"
      du -sh "$DEST"
      exit 0
    fi

    mkdir -p "$DEST"
    export HF_HUB_ENABLE_HF_TRANSFER=1
    export HF_HOME=/host-nvme/.hf-cache
    mkdir -p "$HF_HOME"

    echo "$(date -u +%FT%TZ) [$(hostname)] starting hf download $MODEL_ID -> $DEST"
    if command -v hf >/dev/null 2>&1; then
      time hf download "$MODEL_ID" --local-dir "$DEST" --max-workers 16
    else
      time huggingface-cli download "$MODEL_ID" --local-dir "$DEST" --local-dir-use-symlinks False --max-workers 16
    fi

    touch "$SENTINEL"
    echo "$(date -u +%FT%TZ) [$(hostname)] done"
    du -sh "$DEST"
    ls "$DEST" | wc -l
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kimi-k2-prefetch-hf
  namespace: yanxi-validation
spec:
  backoffLimit: 3
  completions: 2
  parallelism: 2
  completionMode: Indexed
  template:
    metadata:
      labels:
        app: kimi-k2-prefetch-hf
    spec:
      restartPolicy: Never
      tolerations:
        - { key: nvidia.com/gpu, operator: Equal, value: "true", effect: NoSchedule }
      nodeSelector:
        node.kubernetes.io/instance-type: p5en.48xlarge
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: kimi-k2-prefetch-hf
      containers:
        - name: prefetch
          image: 788668107894.dkr.ecr.us-east-2.amazonaws.com/yanxi/sglang-mooncake:v5
          imagePullPolicy: IfNotPresent
          env:
            - { name: MODEL_ID, value: "moonshotai/Kimi-K2-Instruct-0905" }
            - { name: DEST,     value: "/host-nvme/models/Kimi-K2-Instruct-0905" }
          command: ["/bin/bash", "/scripts/prefetch.sh"]
          volumeMounts:
            - { name: local-nvme, mountPath: /host-nvme }
            - { name: scripts,    mountPath: /scripts }
          resources:
            requests: { cpu: "8", memory: "16Gi" }
            limits:   { cpu: "32", memory: "64Gi" }
      volumes:
        - name: local-nvme
          hostPath: { path: /mnt/nvme, type: Directory }
        - name: scripts
          configMap:
            name: kimi-k2-prefetch-hf-script
            defaultMode: 0755
