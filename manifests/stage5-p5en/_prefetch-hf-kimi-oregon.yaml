# Prefetch Kimi-K2-Instruct-0905 from HuggingFace to each Oregon p5en node's /data.
# 959 GB FP8 block-quantized, 62 safetensors shards. Parallel 3-way via Indexed Job.
# /data on Oregon p5en is 27.6 TB vg_local xfs auto-mounted by LT userdata.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kimi-prefetch-hf-oregon-script
  namespace: yanxi-validation
data:
  prefetch.sh: |
    #!/usr/bin/env bash
    set -eux
    MODEL_ID="${MODEL_ID:-moonshotai/Kimi-K2-Instruct-0905}"
    DEST="${DEST:-/data/models/Kimi-K2-Instruct-0905}"
    SENTINEL="$DEST/.nvme-prefetch-done"
    if [ -f "$SENTINEL" ]; then
      echo "$(date -u +%FT%TZ) already complete"; du -sh "$DEST"; exit 0
    fi
    mkdir -p "$DEST"
    export HF_HUB_ENABLE_HF_TRANSFER=1
    export HF_HOME=/data/.hf-cache
    mkdir -p "$HF_HOME"
    echo "$(date -u +%FT%TZ) starting hf download $MODEL_ID -> $DEST"
    if command -v hf >/dev/null 2>&1; then
      time hf download "$MODEL_ID" --local-dir "$DEST" --max-workers 16
    else
      time huggingface-cli download "$MODEL_ID" --local-dir "$DEST" --local-dir-use-symlinks False --max-workers 16
    fi
    touch "$SENTINEL"
    echo "$(date -u +%FT%TZ) done"
    du -sh "$DEST"; ls "$DEST" | wc -l
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kimi-prefetch-hf-oregon
  namespace: yanxi-validation
spec:
  backoffLimit: 3
  completions: 3
  parallelism: 3
  completionMode: Indexed
  template:
    metadata: { labels: { app: kimi-prefetch-hf-oregon } }
    spec:
      restartPolicy: Never
      tolerations:
        - { key: nvidia.com/gpu, operator: Equal, value: "true", effect: NoSchedule }
      nodeSelector:
        node.kubernetes.io/instance-type: p5en.48xlarge
        topology.kubernetes.io/zone: us-west-2c
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector: { matchLabels: { app: kimi-prefetch-hf-oregon } }
      containers:
        - name: prefetch
          image: 788668107894.dkr.ecr.us-west-2.amazonaws.com/yanxi/sglang-mooncake:v5
          imagePullPolicy: IfNotPresent
          env:
            - { name: MODEL_ID, value: "moonshotai/Kimi-K2-Instruct-0905" }
            - { name: DEST,     value: "/data/models/Kimi-K2-Instruct-0905" }
          command: ["/bin/bash", "/scripts/prefetch.sh"]
          volumeMounts:
            - { name: local-data, mountPath: /data }
            - { name: scripts,    mountPath: /scripts }
          resources:
            requests: { cpu: "8", memory: "16Gi" }
            limits:   { cpu: "32", memory: "64Gi" }
      volumes:
        - name: local-data
          hostPath: { path: /data, type: Directory }
        - name: scripts
          configMap:
            name: kimi-prefetch-hf-oregon-script
            defaultMode: 0755
