# =============================================================================
# Customer image .3 GPU smoke — verify the rdma→efa patch actually makes
# Mooncake install the EFA transport (not TCP fallback) on a real EFA node.
#
# Runs on 1 x p5.48xlarge (H100, 32 EFA NICs) in Oregon.
#
# Checks:
#   1. Image integrity: /opt/BUILD_INFO.json + mooncake_transfer_engine.py has "efa"
#   2. EFA visibility: fi_info -p efa shows devices + FI_EP_RDM
#   3. Mooncake TransferEngine.initialize("efa", ...) succeeds and logs
#      "installTransport" WITHOUT "Installing TCP transport" fallback
#   4. UCCL-EP import + deep_ep wrapper routed to uccl.ep
#
# If all 4 pass → .3 image provably uses EFA SRD on AWS; customer's TCP
# fallback bug is fixed at the image layer.
# =============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: customer-image-smoke
  namespace: default
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      nodeSelector:
        node.kubernetes.io/instance-type: p5.48xlarge
      hostNetwork: true
      containers:
        - name: smoke
          image: public.ecr.aws/n3l4x8f3/sglang-mooncake-uccl:2026.04.28-h200.3
          securityContext:
            capabilities:
              add: ["IPC_LOCK"]
          resources:
            requests: { cpu: "2", memory: "8Gi" }
            limits:
              nvidia.com/gpu: "1"
              vpc.amazonaws.com/efa: "32"
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -eu
              echo "=============================="
              echo "=== 1. BUILD_INFO ============"
              echo "=============================="
              cat /opt/BUILD_INFO.json
              echo

              echo "=============================="
              echo "=== 2. sglang protocol patch ="
              echo "=============================="
              python3 -c "
              import inspect
              import sglang.srt.distributed.device_communicators.mooncake_transfer_engine as m
              src = inspect.getsource(m)
              assert '\"efa\",' in src, 'FAIL: \"efa\" not in source'
              assert '\"rdma\",' not in src, 'FAIL: \"rdma\" still in source'
              print('PASS: mooncake_transfer_engine.py uses \"efa\" protocol')
              "
              echo

              echo "=============================="
              echo "=== 3. fi_info -p efa ========"
              echo "=============================="
              fi_info -p efa -t FI_EP_RDM 2>&1 | head -40 || true
              EFA_COUNT=$(fi_info -p efa -t FI_EP_RDM 2>/dev/null | awk '/domain:/ {print $2}' | sort -u | wc -l)
              echo "EFA domains: ${EFA_COUNT}"
              if [ "${EFA_COUNT}" -lt 1 ]; then
                echo "FAIL: no EFA devices visible"; exit 1
              fi
              echo "PASS: EFA devices visible"
              echo

              echo "=============================="
              echo "=== 4. Mooncake TE init on EFA="
              echo "=============================="
              IB_DEVICE=$(fi_info -p efa 2>/dev/null | awk '/domain:/ {print $2}' | sed 's/-rdm$//;s/-dgrm$//' | sort -u | paste -sd, -)
              echo "IB_DEVICE=${IB_DEVICE}"
              python3 - <<'PY' 2>&1 | tee /tmp/te-init.log
              import os
              from mooncake.engine import TransferEngine
              # Mirror sglang's call signature:
              # initialize(hostname, metadata_server, protocol, device_name, ...)
              te = TransferEngine()
              hostname = os.environ.get("HOSTNAME", "smoke-node")
              device = os.environ.get("IB_DEVICE", "rdmap110s0")
              # Pass first device; we just need transport install to succeed.
              first = device.split(",")[0] if device else "rdmap110s0"
              try:
                  ret = te.initialize(hostname + ":12345", "P2PHANDSHAKE", "efa", first)
                  print("initialize returned:", ret)
              except Exception as e:
                  print("initialize raised:", type(e).__name__, e)
              PY
              echo
              echo "=== checking log for TCP fallback ==="
              if grep -q "Installing TCP transport" /tmp/te-init.log; then
                echo "FAIL: TCP fallback still happening on .3 image!"; exit 1
              fi
              if grep -qE "installTransport|EFA|efa" /tmp/te-init.log; then
                echo "PASS: EFA transport installation evidence in log"
              else
                echo "UNKNOWN: no explicit EFA log line, but no TCP fallback either"
              fi
              echo

              echo "=============================="
              echo "=== 5. UCCL-EP / deep_ep ====="
              echo "=============================="
              python3 -c "
              import uccl.ep
              import deep_ep
              assert deep_ep.Config.__module__.startswith('uccl'), deep_ep.Config.__module__
              print('PASS: uccl.ep OK, deep_ep routed to', deep_ep.Config.__module__)
              "
              echo
              echo "=============================="
              echo "=== ALL SMOKE CHECKS PASSED =="
              echo "=============================="
