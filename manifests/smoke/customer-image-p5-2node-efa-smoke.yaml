# =============================================================================
# Customer image .4 — TWO-NODE EFA Mooncake test per official doc
# https://kvcache-ai.github.io/Mooncake/design/transfer-engine/efa_transport.html
#
# V2: proper P2PHANDSHAKE port discovery
# ──────────────────────────────────────
# Mooncake's P2P handshake mode (metadata_server=P2PHANDSHAKE) IGNORES the
# port in --local_server_name and auto-selects a free TCP port instead
# (transfer_engine_impl.cpp:133: findAvailableTcpPort). The real listen port
# is printed in target's own log as:
#     "Transfer Engine RPC using P2P handshake, listening on HOST:PORT"
#
# So the initiator must read TARGET's actual port before connecting. We use
# S3 as the rendezvous (both pods have AWS creds):
#   1. target runs the bench/probe, tees its log to a local file
#   2. a sidecar shell grep's "listening on" → S3 (writes PORT file)
#   3. initiator polls S3 for PORT file, then uses HOST:PORT
#
# Three tests (official doc order):
#   A — TransferEngine.initialize(protocol='efa') → 0 on both nodes (sanity)
#   B — efa_first_submit_probe (1 MB, 32 warmup+5 iters, expects warmup + submit #0..4 timings)
#   C — transfer_engine_bench (1 MB blocks, 16 threads, 128 batch, 10s, expects GB/s line)
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: customer-p5-2node-scripts
  namespace: default
data:
  sync_server.py: |
    # Tiny HTTP server for target → initiator rendezvous. Serves:
    #   GET /probe  -> probe endpoint host:port (or 503 if not ready)
    #   GET /bench  -> bench endpoint
    #   POST /probe?ep=HOST:PORT -> publish probe endpoint
    #   POST /bench?ep=HOST:PORT -> publish bench endpoint
    #   GET /probe-done -> 200 if initiator marked done
    #   GET /bench-done -> 200 if initiator marked done
    #   POST /probe-done, /bench-done -> mark done
    import http.server, socketserver, urllib.parse, threading, sys
    state = {"probe": None, "bench": None, "probe_done": False, "bench_done": False}
    lock = threading.Lock()
    PORT = int(sys.argv[1]) if len(sys.argv) > 1 else 8888
    class H(http.server.BaseHTTPRequestHandler):
        def _send(self, code, body=""):
            self.send_response(code); self.send_header("Content-Type","text/plain"); self.end_headers()
            if body: self.wfile.write(body.encode())
        def do_GET(self):
            p = urllib.parse.urlparse(self.path).path.strip("/")
            with lock:
                if p == "probe" and state["probe"]: return self._send(200, state["probe"])
                if p == "bench" and state["bench"]: return self._send(200, state["bench"])
                if p == "probe-done" and state["probe_done"]: return self._send(200, "done")
                if p == "bench-done" and state["bench_done"]: return self._send(200, "done")
            self._send(503, "not-ready")
        def do_POST(self):
            u = urllib.parse.urlparse(self.path)
            p = u.path.strip("/")
            q = urllib.parse.parse_qs(u.query)
            with lock:
                if p in ("probe","bench") and "ep" in q:
                    state[p] = q["ep"][0]
                    return self._send(200, "ok")
                if p in ("probe-done","bench-done"):
                    state[p.replace("-","_")] = True
                    return self._send(200, "ok")
            self._send(404)
        def log_message(self, *a, **kw): pass
    with socketserver.ThreadingTCPServer(("0.0.0.0", PORT), H) as s:
        print(f"sync_server on :{PORT}", flush=True)
        s.serve_forever()

  target.sh: |
    #!/usr/bin/env bash
    set -eu
    HOST_IP=$(hostname -i | awk '{print $1}')
    SYNC_PORT=8888
    echo "=== TARGET node=$(hostname) ip=$HOST_IP sync=:$SYNC_PORT ==="
    BENCH=/opt/mooncake/install/bin/transfer_engine_bench
    PROBE=/opt/mooncake/install/bin/efa_first_submit_probe

    ls -la /opt/mooncake/install/bin/
    cat /opt/BUILD_INFO.json

    # Start the sync HTTP server in background
    python3 /scripts/sync_server.py $SYNC_PORT > /tmp/sync.log 2>&1 &
    SYNC_PID=$!
    sleep 2

    echo
    echo "=============================="
    echo "== LOCAL Test A sanity ======="
    echo "=============================="
    python3 -c "
    from mooncake.engine import TransferEngine
    te = TransferEngine()
    r = te.initialize('127.0.0.1:12345', 'P2PHANDSHAKE', 'efa', '')
    print(f'RESULT={r}')
    " || echo "Test A failed"

    # Helper: start daemon, grep logfile for real rpc_port, POST to /<label>
    wait_and_publish() {
      local label=$1
      local logfile=$2
      for i in $(seq 1 60); do
        PORT=$(grep -oE 'listening on [0-9a-zA-Z.:]+' "$logfile" 2>/dev/null | head -1 | awk '{print $3}' | awk -F: '{print $NF}')
        if [ -n "$PORT" ]; then
          ENDPOINT="${HOST_IP}:${PORT}"
          echo "[$label] ready — ${ENDPOINT}"
          python3 -c "import urllib.request, urllib.parse; urllib.request.urlopen('http://127.0.0.1:${SYNC_PORT}/${label}?ep=${ENDPOINT}', data=b'', timeout=5).read()"
          return 0
        fi
        sleep 1
      done
      echo "[$label] FAIL: never saw 'listening on' in log"
      return 1
    }

    wait_for_done() {
      local label=$1
      for i in $(seq 1 300); do
        if python3 -c "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:${SYNC_PORT}/${label}-done',timeout=3).status==200 else 1)" 2>/dev/null; then
          echo "[$label] initiator signalled done"
          return 0
        fi
        sleep 1
      done
      echo "[$label] TIMEOUT waiting for initiator done"
      return 1
    }

    echo
    echo "=============================="
    echo "== Step B: efa_first_submit_probe target =="
    echo "=============================="
    $PROBE --mode=target --metadata_server=P2PHANDSHAKE \
      --local_server_name=${HOST_IP}:12345 \
      > /tmp/probe-target.log 2>&1 &
    PROBE_PID=$!

    wait_and_publish probe /tmp/probe-target.log || true
    echo "--- probe target log tail after publish ---"
    tail -15 /tmp/probe-target.log

    wait_for_done probe || true
    kill -TERM $PROBE_PID 2>/dev/null || true
    sleep 2
    kill -KILL $PROBE_PID 2>/dev/null || true
    wait $PROBE_PID 2>/dev/null || true
    echo "=== probe target full log (tail 30) ==="
    tail -30 /tmp/probe-target.log

    echo
    echo "=============================="
    echo "== Step C: transfer_engine_bench target =="
    echo "=============================="
    $BENCH --mode=target --protocol=efa --metadata_server=P2PHANDSHAKE \
      --local_server_name=${HOST_IP}:12346 \
      --buffer_size=4294967296 --gpu_id=-1 \
      > /tmp/bench-target.log 2>&1 &
    BENCH_PID=$!

    wait_and_publish bench /tmp/bench-target.log || true
    echo "--- bench target log tail after publish ---"
    tail -15 /tmp/bench-target.log

    wait_for_done bench || true
    kill -TERM $BENCH_PID 2>/dev/null || true
    sleep 2
    kill -KILL $BENCH_PID 2>/dev/null || true
    wait $BENCH_PID 2>/dev/null || true
    echo "=== bench target full log (tail 80) ==="
    tail -80 /tmp/bench-target.log

    kill $SYNC_PID 2>/dev/null || true
    echo
    echo "=============================="
    echo "== TARGET DONE ==============="
    echo "=============================="

  initiator.sh: |
    #!/usr/bin/env bash
    set -eu
    HOST_IP=$(hostname -i | awk '{print $1}')
    echo "=== INITIATOR node=$(hostname) ip=$HOST_IP ==="
    BENCH=/opt/mooncake/install/bin/transfer_engine_bench
    PROBE=/opt/mooncake/install/bin/efa_first_submit_probe
    SYNC_URL="http://${TARGET_IP}:8888"

    # poll target's sync server until /probe or /bench returns 200 with endpoint
    poll_endpoint() {
      local label=$1
      for i in $(seq 1 300); do
        ep=$(python3 -c "
    import urllib.request,sys
    try:
      r=urllib.request.urlopen('${SYNC_URL}/${label}',timeout=3)
      print(r.read().decode().strip())
    except Exception as e:
      sys.exit(1)
    " 2>/dev/null)
        if [ -n "$ep" ]; then
          echo "$ep"
          return 0
        fi
        sleep 1
      done
      return 1
    }

    signal_done() {
      local label=$1
      python3 -c "import urllib.request; urllib.request.urlopen('${SYNC_URL}/${label}-done',data=b'',timeout=5).read()" || true
    }

    echo
    echo "=============================="
    echo "== LOCAL Test A sanity ======="
    echo "=============================="
    python3 -c "
    from mooncake.engine import TransferEngine
    te = TransferEngine()
    r = te.initialize('127.0.0.1:12345', 'P2PHANDSHAKE', 'efa', '')
    print(f'RESULT={r}')
    " || echo "Test A failed"

    echo
    echo "=============================="
    echo "== Test B: efa_first_submit_probe =="
    echo "=============================="
    echo "polling ${SYNC_URL}/probe ..."
    PROBE_EP=$(poll_endpoint probe) || { echo "FAIL(B): probe endpoint never appeared"; exit 1; }
    echo "PROBE_EP=$PROBE_EP"

    timeout 120 $PROBE --mode=initiator --metadata_server=P2PHANDSHAKE \
      --local_server_name=${HOST_IP}:12345 \
      --segment_id=${PROBE_EP} \
      --warmup=1 --iters=5 \
      2>&1 | tee /tmp/probe-init.log || echo "(probe exited)"

    echo "--- Test B results ---"
    grep -E "(warmup:|submit #[0-9]+:|\\[initiator\\])" /tmp/probe-init.log | head -20 || true

    if grep -qE "submit #[0-9]+:" /tmp/probe-init.log; then
      echo "PASS(B): first-submit probe completed"
    else
      echo "FAIL(B): no submit #N: line"
      tail -30 /tmp/probe-init.log
    fi
    signal_done probe

    echo
    echo "=============================="
    echo "== Test C: transfer_engine_bench =="
    echo "=============================="
    echo "polling ${SYNC_URL}/bench ..."
    BENCH_EP=$(poll_endpoint bench) || { echo "FAIL(C): bench endpoint never appeared"; exit 1; }
    echo "BENCH_EP=$BENCH_EP"

    timeout 90 $BENCH --mode=initiator --protocol=efa \
      --metadata_server=P2PHANDSHAKE \
      --local_server_name=${HOST_IP}:12346 \
      --segment_id=${BENCH_EP} \
      --operation=write --duration=10 --threads=16 \
      --block_size=1048576 --batch_size=128 \
      --buffer_size=4294967296 --gpu_id=-1 \
      --report_unit=GB \
      2>&1 | tee /tmp/bench-init.log || echo "(bench exited)"

    echo "--- Test C results ---"
    grep -E "(Test completed|throughput|GB/s)" /tmp/bench-init.log | head -5 || true

    if grep -qE "throughput [0-9]" /tmp/bench-init.log; then
      echo "PASS(C)"
    else
      echo "FAIL(C): no throughput line"
      tail -40 /tmp/bench-init.log
    fi
    signal_done bench

    echo
    echo "=============================="
    echo "== INITIATOR DONE ============"
    echo "=============================="

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: customer-p5-2node-sa
  namespace: default

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: customer-p5-2node-target
  namespace: default
spec:
  serviceName: customer-p5-2node-target
  replicas: 1
  selector:
    matchLabels: { app: customer-p5-2node, role: target }
  template:
    metadata:
      labels: { app: customer-p5-2node, role: target }
    spec:
      serviceAccountName: customer-p5-2node-sa
      restartPolicy: Always
      hostNetwork: true
      hostIPC: true
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchFields:
                  - key: metadata.name
                    operator: In
                    values: ["PLACEHOLDER_TARGET_NODE"]
      nodeSelector:
        node.kubernetes.io/instance-type: p5.48xlarge
      volumes:
        - name: scripts
          configMap:
            name: customer-p5-2node-scripts
            defaultMode: 0755
      containers:
        - name: smoke
          image: public.ecr.aws/n3l4x8f3/sglang-mooncake-uccl:2026.04.28-h200.4
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
            capabilities:
              add: ["IPC_LOCK","SYS_NICE","SYS_RESOURCE","NET_RAW","NET_ADMIN"]
          env:
            - { name: FI_PROVIDER,            value: "efa" }
            - { name: FI_EFA_USE_DEVICE_RDMA, value: "1" }
            - { name: FI_EFA_FORK_SAFE,       value: "1" }
            - { name: FI_EFA_USE_HUGE_PAGE,   value: "0" }
            - { name: MOONCAKE_PROTOCOL,      value: "efa" }
            - { name: AWS_DEFAULT_REGION,     value: "us-west-2" }
          resources:
            requests: { cpu: "2", memory: "8Gi" }
            limits:
              nvidia.com/gpu: "8"
              vpc.amazonaws.com/efa: "32"
          volumeMounts:
            - { name: scripts, mountPath: /scripts }
          command: ["/bin/bash","/scripts/target.sh"]

---
apiVersion: batch/v1
kind: Job
metadata:
  name: customer-p5-2node-initiator
  namespace: default
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels: { app: customer-p5-2node, role: initiator }
    spec:
      serviceAccountName: customer-p5-2node-sa
      restartPolicy: Never
      hostNetwork: true
      hostIPC: true
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchFields:
                  - key: metadata.name
                    operator: In
                    values: ["PLACEHOLDER_INITIATOR_NODE"]
      nodeSelector:
        node.kubernetes.io/instance-type: p5.48xlarge
      volumes:
        - name: scripts
          configMap:
            name: customer-p5-2node-scripts
            defaultMode: 0755
      containers:
        - name: smoke
          image: public.ecr.aws/n3l4x8f3/sglang-mooncake-uccl:2026.04.28-h200.4
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
            capabilities:
              add: ["IPC_LOCK","SYS_NICE","SYS_RESOURCE","NET_RAW","NET_ADMIN"]
          env:
            - { name: FI_PROVIDER,            value: "efa" }
            - { name: FI_EFA_USE_DEVICE_RDMA, value: "1" }
            - { name: FI_EFA_FORK_SAFE,       value: "1" }
            - { name: FI_EFA_USE_HUGE_PAGE,   value: "0" }
            - { name: MOONCAKE_PROTOCOL,      value: "efa" }
            - { name: AWS_DEFAULT_REGION,     value: "us-west-2" }
            - { name: TARGET_IP,              value: "PLACEHOLDER_TARGET_IP" }
          resources:
            requests: { cpu: "2", memory: "8Gi" }
            limits:
              nvidia.com/gpu: "8"
              vpc.amazonaws.com/efa: "32"
          volumeMounts:
            - { name: scripts, mountPath: /scripts }
          command: ["/bin/bash","/scripts/initiator.sh"]
