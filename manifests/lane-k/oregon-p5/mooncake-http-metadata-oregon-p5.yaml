#
# Mooncake HTTP metadata server for Lane K on Oregon p5.
# Same logic as manifests/lane-k/mooncake-http-metadata.yaml, but:
#   - nodeSelector: p5.48xlarge (any AZ; will land wherever scheduler picks)
#   - image: Oregon ECR, v6.1 tag
#   - hostNetwork: true → bench pods reach this via host-node IP:8080
#
---
apiVersion: v1
kind: Service
metadata:
  name: mooncake-meta
  namespace: yanxi-validation
spec:
  selector:
    app: mooncake-meta
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mooncake-meta
  namespace: yanxi-validation
  labels:
    app: mooncake-meta
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mooncake-meta
  template:
    metadata:
      labels:
        app: mooncake-meta
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        node.kubernetes.io/instance-type: p5.48xlarge
        topology.kubernetes.io/zone: us-west-2c
      tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      containers:
        - name: server
          image: 788668107894.dkr.ecr.us-west-2.amazonaws.com/yanxi/mooncake-nixl:v6.1
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -lc
            - |
              exec python3 -m mooncake.http_metadata_server --port 8080 --host 0.0.0.0 --log-level INFO
          ports:
            - containerPort: 8080
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
