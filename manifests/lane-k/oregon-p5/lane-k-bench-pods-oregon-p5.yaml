    topology.kubernetes.io/zone: us-west-2c
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app: lane-k-bench
          topologyKey: kubernetes.io/hostname
  tolerations:
