apiVersion: v1
kind: Service
metadata:
  name: etcd
  namespace: yanxi-validation
  labels:
    app: etcd
    purpose: nixlbench-coordination
spec:
  selector:
    app: etcd
  ports:
    - name: client
      port: 2379
      targetPort: 2379
    - name: peer
      port: 2380
      targetPort: 2380
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: etcd
  namespace: yanxi-validation
  labels:
    app: etcd
    purpose: nixlbench-coordination
spec:
  replicas: 1
  selector:
    matchLabels:
      app: etcd
  template:
    metadata:
      labels:
        app: etcd
    spec:
      tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      containers:
        - name: etcd
          image: quay.io/coreos/etcd:v3.5.15
          args:
            - /usr/local/bin/etcd
            - --name=etcd0
            - --data-dir=/var/lib/etcd
            - --listen-client-urls=http://0.0.0.0:2379
            - --advertise-client-urls=http://etcd.yanxi-validation.svc:2379
            - --listen-peer-urls=http://0.0.0.0:2380
            - --initial-advertise-peer-urls=http://etcd.yanxi-validation.svc:2380
            - --initial-cluster=etcd0=http://etcd.yanxi-validation.svc:2380
            - --initial-cluster-state=new
            - --initial-cluster-token=lane-k
            - --auto-compaction-retention=1
          ports:
            - containerPort: 2379
            - containerPort: 2380
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          readinessProbe:
            exec:
              command:
                - /usr/local/bin/etcdctl
                - endpoint
                - health
            initialDelaySeconds: 3
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/etcd
      volumes:
        - name: data
          emptyDir:
            sizeLimit: 1Gi
