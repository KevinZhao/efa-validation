# Stage 3.1 Round A — VRAM→VRAM (GPUDirect RDMA)
# 仅改 use_vram=true；其它与 mooncake-efa-bench.yaml 保持一致以便对照。
apiVersion: v1
kind: Service
metadata:
  name: mooncake-metadata
  namespace: yanxi-validation
spec:
  selector:
    app: mooncake-metadata
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: mooncake-bench
  namespace: yanxi-validation
spec:
  clusterIP: None
  selector:
    app: mooncake-bench
  publishNotReadyAddresses: true
  ports:
    - name: dummy
      port: 12345
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mooncake-metadata
  namespace: yanxi-validation
  labels:
    app: mooncake-metadata
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mooncake-metadata
  template:
    metadata:
      labels:
        app: mooncake-metadata
    spec:
      tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      nodeSelector:
        node.kubernetes.io/instance-type: p5en.48xlarge
      containers:
        - name: metadata
          image: 788668107894.dkr.ecr.us-east-2.amazonaws.com/yanxi/mooncake-nixl:v2
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: workspace
              mountPath: /workspace
          command: ["/bin/bash", "-lc"]
          args:
            - |
              set -eux
              mkdir -p /workspace/metadata-build
              cp -r /opt/mooncake/mooncake-transfer-engine/example/http-metadata-server/. /workspace/metadata-build/
              cd /workspace/metadata-build
              export PATH="/usr/local/go/bin:${PATH}"
              export GOCACHE=/workspace/.gocache
              export GOMODCACHE=/workspace/.gomodcache
              go mod tidy
              go build -o /usr/local/bin/mooncake-metadata-server . 2>&1
              exec /usr/local/bin/mooncake-metadata-server --addr=:8080
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "2"
              memory: 4Gi
            requests:
              cpu: "500m"
              memory: 1Gi
      volumes:
        - name: workspace
          emptyDir: {}
---
apiVersion: v1
kind: Pod
metadata:
  name: mooncake-target
  namespace: yanxi-validation
  labels:
    app: mooncake-bench
    role: target
spec:
  restartPolicy: Never
  hostname: mooncake-target
  subdomain: mooncake-bench
  tolerations:
    - key: nvidia.com/gpu
      operator: Equal
      value: "true"
      effect: NoSchedule
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [mooncake-bench]
          topologyKey: kubernetes.io/hostname
  nodeSelector:
    node.kubernetes.io/instance-type: p5en.48xlarge
  containers:
    - name: target
      image: 788668107894.dkr.ecr.us-east-2.amazonaws.com/yanxi/mooncake-nixl:v2
      imagePullPolicy: IfNotPresent
      env:
        - name: FI_PROVIDER
          value: "efa"
        - name: FI_EFA_USE_DEVICE_RDMA
          value: "1"
        - name: FI_EFA_FORK_SAFE
          value: "1"
      command: ["/bin/bash", "-lc"]
      args:
        - |
          set -eux
          for i in $(seq 1 120); do
            CODE=$(curl -o /dev/null -s -w "%{http_code}" http://mooncake-metadata.yanxi-validation.svc:8080/metadata 2>/dev/null || echo 000)
            if [ "$CODE" = "404" ] || [ "$CODE" = "200" ]; then
              echo "metadata server reachable (code=$CODE)"; break
            fi
            echo "attempt=$i code=$CODE"; sleep 2
          done
          MY_IP=$(hostname -i | awk '{print $1}')
          echo "target IP=$MY_IP"
          cd /opt/mooncake/build/mooncake-transfer-engine/example
          exec ./transfer_engine_bench \
            --mode=target \
            --protocol=efa \
            --local_server_name="${MY_IP}:12345" \
            --metadata_server="http://mooncake-metadata.yanxi-validation.svc:8080/metadata" \
            --use_vram=true \
            --gpu_id=0 \
            --buffer_size=$((4<<30)) \
            --duration=180
      securityContext:
        capabilities:
          add: [IPC_LOCK]
      resources:
        limits:
          nvidia.com/gpu: 1
          vpc.amazonaws.com/efa: 16
          hugepages-2Mi: 5120Mi
          memory: 128Gi
        requests:
          nvidia.com/gpu: 1
          vpc.amazonaws.com/efa: 16
          hugepages-2Mi: 5120Mi
          memory: 128Gi
      volumeMounts:
        - name: shm
          mountPath: /dev/shm
  volumes:
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: 32Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: mooncake-initiator
  namespace: yanxi-validation
  labels:
    app: mooncake-bench
    role: initiator
spec:
  restartPolicy: Never
  hostname: mooncake-initiator
  subdomain: mooncake-bench
  tolerations:
    - key: nvidia.com/gpu
      operator: Equal
      value: "true"
      effect: NoSchedule
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [mooncake-bench]
          topologyKey: kubernetes.io/hostname
  nodeSelector:
    node.kubernetes.io/instance-type: p5en.48xlarge
  containers:
    - name: initiator
      image: 788668107894.dkr.ecr.us-east-2.amazonaws.com/yanxi/mooncake-nixl:v2
      imagePullPolicy: IfNotPresent
      env:
        - name: FI_PROVIDER
          value: "efa"
        - name: FI_EFA_USE_DEVICE_RDMA
          value: "1"
        - name: FI_EFA_FORK_SAFE
          value: "1"
      command: ["/bin/bash", "-lc"]
      args:
        - |
          set -eux
          for i in $(seq 1 120); do
            CODE=$(curl -o /dev/null -s -w "%{http_code}" http://mooncake-metadata.yanxi-validation.svc:8080/metadata 2>/dev/null || echo 000)
            if [ "$CODE" = "404" ] || [ "$CODE" = "200" ]; then
              echo "metadata server reachable (code=$CODE)"; break
            fi
            echo "attempt=$i code=$CODE"; sleep 2
          done
          for i in $(seq 1 60); do
            TARGET_IP=$(getent hosts mooncake-target.mooncake-bench.yanxi-validation.svc 2>/dev/null | awk '{print $1}' || true)
            [ -n "$TARGET_IP" ] && break
            sleep 3
          done
          if [ -z "$TARGET_IP" ]; then
            echo "target DNS not resolvable"; exit 1
          fi
          echo "target_ip=$TARGET_IP"
          sleep 10
          MY_IP=$(hostname -i | awk '{print $1}')
          mkdir -p /workspace/out
          cd /opt/mooncake/build/mooncake-transfer-engine/example
          ./transfer_engine_bench \
            --mode=initiator \
            --protocol=efa \
            --local_server_name="${MY_IP}:12346" \
            --segment_id="${TARGET_IP}:12345" \
            --metadata_server="http://mooncake-metadata.yanxi-validation.svc:8080/metadata" \
            --operation=write \
            --use_vram=true \
            --gpu_id=0 \
            --buffer_size=$((4<<30)) \
            --block_size=$((4<<20)) \
            --batch_size=64 \
            --threads=12 \
            --duration=60 \
            2>&1 | tee /workspace/out/mooncake-efa-write-A-vram.log
          echo "=== DONE ==="
      securityContext:
        capabilities:
          add: [IPC_LOCK]
      resources:
        limits:
          nvidia.com/gpu: 1
          vpc.amazonaws.com/efa: 16
          hugepages-2Mi: 5120Mi
          memory: 128Gi
        requests:
          nvidia.com/gpu: 1
          vpc.amazonaws.com/efa: 16
          hugepages-2Mi: 5120Mi
          memory: 128Gi
      volumeMounts:
        - name: shm
          mountPath: /dev/shm
        - name: workspace
          mountPath: /workspace
  volumes:
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: 32Gi
    - name: workspace
      emptyDir: {}
