apiVersion: batch/v1
kind: Job
metadata:
  name: clean-model-dir
  namespace: efa-validation
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 300
  completions: 2
  parallelism: 2
  template:
    spec:
      restartPolicy: Never
      tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      nodeSelector:
        node.kubernetes.io/instance-type: p5.48xlarge
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels: { job-name: clean-model-dir }
              topologyKey: kubernetes.io/hostname
      containers:
        - name: clean
          image: <AWS_ACCOUNT_ID>.dkr.ecr.us-east-2.amazonaws.com/efa-validation/sglang-mooncake:v1
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "-lc"]
          args:
            - |
              set -eux
              cd /models/current
              # Remove 7B artifacts (4-shard scheme).
              rm -f model-00001-of-00004.safetensors model-00002-of-00004.safetensors model-00003-of-00004.safetensors model-00004-of-00004.safetensors
              ls -la | head -30
          volumeMounts:
            - name: models
              mountPath: /models
      volumes:
        - name: models
          hostPath:
            path: /var/lib/efa-models
            type: Directory
