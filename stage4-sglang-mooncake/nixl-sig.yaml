apiVersion: v1
kind: Pod
metadata:
  name: nixl-sig
  namespace: yanxi-validation
spec:
  restartPolicy: Never
  tolerations:
    - key: nvidia.com/gpu
      operator: Equal
      value: "true"
      effect: NoSchedule
  nodeSelector:
    node.kubernetes.io/instance-type: p5en.48xlarge
  containers:
    - name: probe
      image: 788668107894.dkr.ecr.us-east-2.amazonaws.com/yanxi/sglang-mooncake:v1
      command: ["/bin/bash","-lc"]
      args:
        - |
          grep -n -A15 'def register_memory' /opt/nixl/lib/python3/dist-packages/nixl_cu12/_api.py | head -40
          echo ---
          grep -n 'is_sorted\|register_memory' /usr/local/lib/python3.10/dist-packages/sglang/srt/disaggregation/nixl/conn.py | head -20
          sleep 300
