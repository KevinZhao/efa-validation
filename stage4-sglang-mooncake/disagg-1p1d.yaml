---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sglang-lb
  namespace: yanxi-validation
  labels: { app: sglang-disagg-lb }
spec:
  replicas: 1
  selector:
    matchLabels: { app: sglang-disagg-lb }
  template:
    metadata:
      labels: { app: sglang-disagg-lb }
    spec:
      tolerations:
        # The only available nodes in this ns carry the nvidia.com/gpu=true
        # taint. Tolerate it so LB can run alongside GPU workloads — it uses
        # no GPU resources.
        - key: nvidia.com/gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      containers:
        - name: lb
          image: 788668107894.dkr.ecr.us-east-2.amazonaws.com/yanxi/sglang-mooncake:v1
          imagePullPolicy: IfNotPresent
          env:
            - name: ROLE
              value: "lb"
            - name: PREFILL_URL
              value: "http://sglang-prefill.yanxi-validation.svc:30000"
            - name: DECODE_URL
              value: "http://sglang-decode.yanxi-validation.svc:30000"
            - name: LB_PORT
              value: "8000"
          command: ["/bin/bash", "-lc"]
          args: ["exec /scripts/sglang-launcher.sh"]
          ports:
            - { containerPort: 8000, name: http }
          resources:
            limits: { cpu: "4", memory: 8Gi }
            requests: { cpu: "1", memory: 2Gi }
          volumeMounts:
            - { name: scripts, mountPath: /scripts }
      volumes:
        - name: scripts
          configMap:
            name: sglang-launcher-override
            defaultMode: 0755
