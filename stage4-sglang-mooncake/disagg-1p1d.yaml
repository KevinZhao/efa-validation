      containers:
        - name: server
          image: 788668107894.dkr.ecr.us-east-2.amazonaws.com/yanxi/sglang-mooncake:v1
          imagePullPolicy: IfNotPresent
          env:
            - name: ROLE
              value: "decode"
            - name: MODEL_PATH
              value: "/models/current"
            - name: TP
              value: "8"
            - name: PORT
              value: "30000"
            - name: BOOTSTRAP_PORT
              value: "8998"
            - name: KV_TRANSPORT_BACKEND
              value: "nixl"
          command: ["/bin/bash", "-lc"]
          args: ["exec /scripts/sglang-launcher.sh"]
          readinessProbe:
            httpGet: { path: /get_model_info, port: 30000 }
            initialDelaySeconds: 60
            periodSeconds: 5
            failureThreshold: 120
          ports:
            - { containerPort: 30000, name: http }
            - { containerPort: 8998, name: bootstrap }
          securityContext:
            capabilities: { add: [IPC_LOCK] }
          resources:
            limits:
              nvidia.com/gpu: 8
              vpc.amazonaws.com/efa: 16
              hugepages-2Mi: 5120Mi
              memory: 256Gi
            requests:
              nvidia.com/gpu: 8
              vpc.amazonaws.com/efa: 16
              hugepages-2Mi: 5120Mi
              memory: 256Gi
          volumeMounts:
            - { name: models, mountPath: /models }
            - { name: shm, mountPath: /dev/shm }
            - { name: scripts, mountPath: /scripts }
