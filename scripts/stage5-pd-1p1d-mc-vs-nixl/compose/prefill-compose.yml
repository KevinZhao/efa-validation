version: '3.4'
services:
  k2-5-pd-prefill:
    image: 788668107894.dkr.ecr.us-east-2.amazonaws.com/yanxi/sglang-mooncake-nixl-uccl:2026.04.30-h200.6
    privileged: true
    restart: "no"           # no auto-restart; we want to cleanly start/stop per variant
    pull_policy: always
    deploy:
      resources:
        reservations:
          devices:
          - driver: nvidia
            device_ids: ['0','1','2','3','4','5','6','7']
            capabilities: [gpu]
    shm_size: 8192gb
    ipc: host
    environment:
      # --- backend selector (the ONE variable in this A/B) -----------------
      - KV_BACKEND=${KV_BACKEND:-mooncake}

      # --- SGLang internals (verbatim from customer) -----------------------
      - NVIDIA_SPARSE_ENABLE=1
      - OMP_NUM_THREADS=16
      - SGLANG_SET_CPU_AFFINITY=1
      - SGLANG_ALLOW_OVERWRITE_LONGER_CONTEXT_LEN=1
      - SGLANG_MOE_PADDING=1
      - SGLANG_ENABLE_JIT_DEEPGEMM=1
      - SGLANG_JIT_DEEPGEMM_COMPILE_WORKERS=32
      - SGLANG_DG_CACHE_DIR=/sglang/deep_gemm
      - SGLANG_CHUNKED_PREFIX_CACHE_THRESHOLD=16384
      - SGLANG_DISAGGREGATION_HEARTBEAT_INTERVAL=10
      - SGLANG_DISAGGREGATION_BOOTSTRAP_TIMEOUT=181
      - SGLANG_DISAGGREGATION_WAITING_TIMEOUT=179
      - PYTHONUNBUFFERED=1
      - SGLANG_HEALTH_CHECK_MEM_FREE=50

      # --- Networking (both backends read FI_* for EFA) --------------------
      - GLOO_SOCKET_IFNAME=enp71s0
      - NCCL_DEBUG=WARN
      - NCCL_SOCKET_IFNAME=enp71s0
      - FI_PROVIDER=efa
      - FI_EFA_USE_DEVICE_RDMA=1
      - FI_MR_CACHE_MAX_COUNT=524288
      - FI_MR_CACHE_MERGE_REGIONS=1

      # --- Mooncake-only env (NIXL path simply ignores these) --------------
      - MOONCAKE_PROTOCOL=efa
      - MC_NUM_CQ_PER_CTX=4
      - MC_MAX_WR=16384
      - MC_MAX_CQ_PER_CTX=65536

      # --- UCCL-EP / NVSHMEM env (unused in this PD-disagg run; kept for symmetry)
      - NVSHMEM_REMOTE_TRANSPORT=libfabric
      - NVSHMEM_LIBFABRIC_PROVIDER=efa
    network_mode: host
    volumes:
      - /data:/data
      - /data/models/Kimi-K2.5:/models/model:ro
      - /data/logs:/sglang/logs
      - /data/sglang/pd_k2.5/tp8_pd_prefill/torch-compile:/sglang/torch-compile
      - /data/sglang/pd_k2.5/tp8_pd_prefill/deep_gemm:/sglang/deep_gemm
      - ${ENTRYPOINT_DIR:-/data/entrypoints}:/entrypoints:ro
    entrypoint: /bin/bash /entrypoints/prefill_entrypoint.sh
    logging:
      driver: json-file
      options:
        max-size: "5g"
        max-file: "3"
