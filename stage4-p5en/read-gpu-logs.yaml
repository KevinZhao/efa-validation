apiVersion: v1
kind: Pod
metadata:
  name: read-gpu-node1
  namespace: yanxi-validation
  labels: { app: read-gpu }
spec:
  restartPolicy: Never
  tolerations:
    - { key: nvidia.com/gpu, operator: Equal, value: "true", effect: NoSchedule }
  nodeSelector:
    kubernetes.io/hostname: ip-10-1-11-93.us-east-2.compute.internal
  containers:
    - name: r
      image: alpine:3.20
      command: ["sh", "-c", "cat /logs/ip-10-1-11-93.us-east-2.compute.internal.csv; sleep 300"]
      volumeMounts: [{name: l, mountPath: /logs}]
  volumes:
    - name: l
      hostPath: { path: /var/log/gpu-sampler }
---
