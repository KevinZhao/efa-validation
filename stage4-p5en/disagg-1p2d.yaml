apiVersion: apps/v1
kind: Deployment
metadata:
  name: sglang-lb
  namespace: yanxi-validation
  labels: { app: sglang-disagg-lb }
spec:
  replicas: 1
  selector:
    matchLabels: { app: sglang-disagg-lb }
  template:
    metadata:
      labels: { app: sglang-disagg-lb }
    spec:
      tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      containers:
        - name: lb
          image: 788668107894.dkr.ecr.us-east-2.amazonaws.com/yanxi/sglang-mooncake:v2
          imagePullPolicy: IfNotPresent
          env:
            - name: ROLE
              value: "lb"
            - name: PREFILL_URL
              value: "http://sglang-prefill.yanxi-validation.svc:30000"
            - name: DECODE_URL
              value: "http://sglang-decode-0.yanxi-validation.svc:30000,http://sglang-decode-1.yanxi-validation.svc:30000"
            - name: LB_PORT
              value: "8000"
          command: ["/bin/bash", "-lc"]
          args: ["exec /scripts/sglang-launcher.sh"]
          ports:
            - { containerPort: 8000, name: http }
          resources:
            limits: { cpu: "4", memory: 8Gi }
            requests: { cpu: "1", memory: 2Gi }
          volumeMounts:
            - { name: scripts, mountPath: /scripts }
      volumes:
        - name: scripts
          configMap:
            name: sglang-launcher-override
            defaultMode: 0755
