apiVersion: v1
kind: Pod
metadata:
  name: mklog-160
  namespace: yanxi-validation
spec:
  restartPolicy: Never
  nodeSelector:
    kubernetes.io/hostname: ip-10-1-12-160.us-east-2.compute.internal
  tolerations:
    - key: nvidia.com/gpu
      operator: Equal
      value: "true"
      effect: NoSchedule
  containers:
    - name: x
      image: busybox:1.36
      command: ["sh","-c","mkdir -p /h/yanxi-logs/stage2 && chmod 1777 /h/yanxi-logs && ls -ld /h/yanxi-logs"]
      volumeMounts:
        - name: h
          mountPath: /h
  volumes:
    - name: h
      hostPath: {path: /var/lib}
---
