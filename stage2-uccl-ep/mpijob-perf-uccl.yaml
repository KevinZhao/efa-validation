# -----------------------------------------------------------------------------
# Stage 2.1 - UCCL-EP perf on EFA.
# Runs the upstream UCCL-EP internode low-latency test: hidden=7168, Top-8
# routing, 2x p5.48xlarge. Pair with mpijob-perf-nccl.yaml (DeepEP baseline)
# for apples-to-apples latency + bandwidth comparison.
#
# Confirmed paths in the image:
#   /opt/uccl/ep/tests/test_internode.py        (RDMA-kernel path)
#   /opt/uccl/ep/tests/test_low_latency.py      (single-node low-latency)
#   /opt/uccl/ep/tests/test_low_latency_pplx.py (pplx multi-node low-latency)
#   /opt/uccl/ep/bench/                         (bench helpers)
# Python module is `uccl.ep`.
#
# Structure mirrors the proven stage1-nccl-tests template:
# launcher on a GPU node with tolerations + nodeSelector, hostfile wait loop,
# ssh validation, eth0/FQDN MCA flags.
# -----------------------------------------------------------------------------
apiVersion: kubeflow.org/v2beta1
kind: MPIJob
metadata:
  name: uccl-ep-perf-uccl
  namespace: efa-validation
spec:
  slotsPerWorker: 8
  runPolicy:
    cleanPodPolicy: Running
    ttlSecondsAfterFinished: 3600
  sshAuthMountPath: /root/.ssh
  mpiReplicaSpecs:
    Launcher:
      replicas: 1
      template:
        spec:
          serviceAccountName: efa-runner
          restartPolicy: Never
          tolerations:
            - key: nvidia.com/gpu
              operator: Equal
              value: "true"
              effect: NoSchedule
          nodeSelector:
            node.kubernetes.io/instance-type: p5.48xlarge
          containers:
            - name: launcher
              image: <AWS_ACCOUNT_ID>.dkr.ecr.us-east-2.amazonaws.com/efa-validation/uccl-ep:v1
              imagePullPolicy: IfNotPresent
              env: &commonEnv
                - name: OMPI_ALLOW_RUN_AS_ROOT
                  value: "1"
                - name: OMPI_ALLOW_RUN_AS_ROOT_CONFIRM
                  value: "1"
                - name: NCCL_DEBUG
                  value: "INFO"
                - name: NCCL_DEBUG_SUBSYS
                  value: "INIT,NET,ENV"
                - name: FI_PROVIDER
                  value: "efa"
                - name: FI_EFA_USE_DEVICE_RDMA
                  value: "1"
                - name: FI_EFA_FORK_SAFE
                  value: "1"
                - name: NCCL_NET_PLUGIN
                  value: "/opt/aws-ofi-nccl/lib/libnccl-net.so"
                - name: PATH
                  value: "/opt/amazon/efa/bin:/opt/amazon/openmpi/bin:/usr/local/nvidia/bin:/usr/local/cuda/bin:/usr/local/bin:/usr/bin:/bin"
                - name: LD_LIBRARY_PATH
                  value: "/opt/amazon/efa/lib:/opt/amazon/openmpi/lib:/opt/aws-ofi-nccl/lib:/usr/local/nvidia/lib64:/usr/local/cuda/lib64:/usr/local/lib:/usr/lib"
                - name: PYTHONUNBUFFERED
                  value: "1"
                - name: OMP_NUM_THREADS
                  value: "8"
              command:
                - /bin/bash
                - -lc
                - |
                  set -eux
                  echo "===== uccl-ep perf (uccl.ep) launcher ready ====="
                  cat /etc/mpi/discover_hosts.sh || true

                  # Wait for workers to appear in discover_hosts.sh
                  for i in $(seq 1 60); do
                    HOSTS=$(/etc/mpi/discover_hosts.sh 2>/dev/null | paste -sd, -)
                    NH=$(/etc/mpi/discover_hosts.sh 2>/dev/null | wc -l)
                    echo "attempt=$i hosts_count=$NH hosts=$HOSTS"
                    [ "$NH" -ge 2 ] && break
                    sleep 5
                  done

                  if [ "$NH" -lt 2 ]; then
                    echo "FATAL: workers not discovered after 5 minutes"
                    exit 1
                  fi

                  # Build hostfile with explicit slots=8
                  HOSTFILE=/tmp/hostfile
                  : > $HOSTFILE
                  for h in $(/etc/mpi/discover_hosts.sh); do
                    echo "$h slots=8" >> $HOSTFILE
                  done
                  echo "--- hostfile ---"
                  cat $HOSTFILE

                  # Validate ssh connectivity to each worker
                  for h in $(/etc/mpi/discover_hosts.sh); do
                    for i in $(seq 1 30); do
                      if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=2 "$h" hostname 2>/dev/null; then
                        echo "ssh OK: $h"
                        break
                      fi
                      sleep 2
                    done
                  done

                  MY_IP=$(hostname -i | awk '{print $1}')
                  echo "launcher IP=$MY_IP"

                  ENV_ARGS=(
                    -x PATH -x LD_LIBRARY_PATH
                    -x NCCL_DEBUG -x NCCL_DEBUG_SUBSYS
                    -x FI_PROVIDER -x FI_EFA_USE_DEVICE_RDMA -x FI_EFA_FORK_SAFE
                    -x NCCL_NET_PLUGIN
                    -x PYTHONUNBUFFERED -x OMP_NUM_THREADS
                    -x OMPI_ALLOW_RUN_AS_ROOT -x OMPI_ALLOW_RUN_AS_ROOT_CONFIRM
                  )

                  MPI_COMMON=(
                    --allow-run-as-root
                    --hostfile "$HOSTFILE"
                    -np 16 -N 8
                    --mca pml ^ucx --mca btl ^openib
                    --mca plm_rsh_no_tree_spawn 1
                    --mca orte_keep_fqdn_hostnames 1
                    --mca oob_tcp_if_include eth0
                    --mca btl_tcp_if_include eth0
                    --bind-to none
                    "${ENV_ARGS[@]}"
                  )

                  mkdir -p /workspace/out

                  # Primary: UCCL-EP internode RDMA-kernel test.
                  BENCH=/opt/uccl/ep/tests/test_internode.py
                  LL_BENCH=/opt/uccl/ep/tests/test_low_latency_pplx.py

                  echo "===== UCCL-EP internode bench: hidden=7168 topk=8 ====="
                  mpirun "${MPI_COMMON[@]}" \
                    python "$BENCH" \
                    2>&1 | tee /workspace/out/uccl-perf-internode.log

                  echo "===== UCCL-EP low-latency (pplx) bench ====="
                  mpirun "${MPI_COMMON[@]}" \
                    python "$LL_BENCH" \
                    2>&1 | tee /workspace/out/uccl-perf-ll.log

                  echo "===== DONE ====="
              volumeMounts:
                - name: workspace
                  mountPath: /workspace
          volumes:
            - name: workspace
              emptyDir: {}
    Worker:
      replicas: 2
      template:
        spec:
          restartPolicy: OnFailure
          hostNetwork: false
          dnsPolicy: ClusterFirstWithHostNet
          tolerations:
            - key: nvidia.com/gpu
              operator: Equal
              value: "true"
              effect: NoSchedule
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      training.kubeflow.org/job-name: uccl-ep-perf-uccl
                      training.kubeflow.org/job-role: worker
                  topologyKey: kubernetes.io/hostname
          containers:
            - name: worker
              image: <AWS_ACCOUNT_ID>.dkr.ecr.us-east-2.amazonaws.com/efa-validation/uccl-ep:v1
              imagePullPolicy: IfNotPresent
              env: *commonEnv
              securityContext:
                capabilities:
                  add: [IPC_LOCK]
              resources:
                limits:
                  nvidia.com/gpu: 8
                  vpc.amazonaws.com/efa: 32
                  hugepages-2Mi: 5120Mi
                  memory: 256Gi
                requests:
                  nvidia.com/gpu: 8
                  vpc.amazonaws.com/efa: 32
                  hugepages-2Mi: 5120Mi
                  memory: 256Gi
              volumeMounts:
                - name: shm
                  mountPath: /dev/shm
                - name: workspace
                  mountPath: /workspace
          volumes:
            - name: shm
              emptyDir:
                medium: Memory
                sizeLimit: 32Gi
            - name: workspace
              emptyDir: {}
