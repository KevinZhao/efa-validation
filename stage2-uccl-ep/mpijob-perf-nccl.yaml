# -----------------------------------------------------------------------------
# Stage 2.1 - DeepEP (NCCL-EP baseline) perf on EFA (v2).
# Pairs with mpijob-perf-uccl.yaml. Same ranks/topology: hidden=7168, topk=8.
# -----------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: uccl-ep-perf-nccl-script
  namespace: yanxi-validation
data:
  wrapper-internode.sh: |
    #!/usr/bin/env bash
    set -eu
    : "${OMPI_COMM_WORLD_RANK:?}"; export RANK="${OMPI_COMM_WORLD_RANK}"
    export WORLD_SIZE="${OMPI_COMM_WORLD_SIZE}"
    export LOCAL_RANK="${OMPI_COMM_WORLD_LOCAL_RANK}"
    export LOCAL_WORLD_SIZE="${OMPI_COMM_WORLD_LOCAL_SIZE}"
    export MASTER_ADDR="${MASTER_HOST:-127.0.0.1}"
    export MASTER_PORT="${MASTER_PORT:-29500}"
    TORCH_LIB=$(python3 -c "import torch, os; print(os.path.join(os.path.dirname(torch.__file__), 'lib'))")
    export LD_LIBRARY_PATH="${TORCH_LIB}:${LD_LIBRARY_PATH:-}"
    cd /opt/deepep/tests
    exec python3 test_internode.py "$@"
  wrapper-ll.sh: |
    #!/usr/bin/env bash
    set -eu
    : "${OMPI_COMM_WORLD_RANK:?}"; export RANK="${OMPI_COMM_WORLD_RANK}"
    export WORLD_SIZE="${OMPI_COMM_WORLD_SIZE}"
    export LOCAL_RANK="${OMPI_COMM_WORLD_LOCAL_RANK}"
    export LOCAL_WORLD_SIZE="${OMPI_COMM_WORLD_LOCAL_SIZE}"
    export MASTER_ADDR="${MASTER_HOST:-127.0.0.1}"
    export MASTER_PORT="${MASTER_PORT:-29500}"
    TORCH_LIB=$(python3 -c "import torch, os; print(os.path.join(os.path.dirname(torch.__file__), 'lib'))")
    export LD_LIBRARY_PATH="${TORCH_LIB}:${LD_LIBRARY_PATH:-}"
    cd /opt/deepep/tests
    exec python3 test_low_latency.py "$@"
---
apiVersion: kubeflow.org/v2beta1
kind: MPIJob
metadata:
  name: uccl-ep-perf-nccl
  namespace: yanxi-validation
spec:
  slotsPerWorker: 8
  runPolicy:
    cleanPodPolicy: Running
    ttlSecondsAfterFinished: 3600
  sshAuthMountPath: /root/.ssh
  mpiReplicaSpecs:
    Launcher:
      replicas: 1
      template:
        spec:
          serviceAccountName: yanxi-runner
          restartPolicy: Never
          tolerations:
            - key: nvidia.com/gpu
              operator: Equal
              value: "true"
              effect: NoSchedule
          nodeSelector:
            kubernetes.io/hostname: ip-10-1-12-160.us-east-2.compute.internal
          containers:
            - name: launcher
              image: 788668107894.dkr.ecr.us-east-2.amazonaws.com/yanxi/uccl-ep:v2
              imagePullPolicy: IfNotPresent
              env: &commonEnv
                - name: OMPI_ALLOW_RUN_AS_ROOT
                  value: "1"
                - name: OMPI_ALLOW_RUN_AS_ROOT_CONFIRM
                  value: "1"
                - name: NCCL_DEBUG
                  value: "INFO"
                - name: NCCL_DEBUG_SUBSYS
                  value: "INIT,NET,ENV"
                - name: FI_PROVIDER
                  value: "efa"
                - name: FI_EFA_USE_DEVICE_RDMA
                  value: "1"
                - name: FI_EFA_FORK_SAFE
                  value: "1"
                - name: NCCL_NET_PLUGIN
                  value: "/opt/aws-ofi-nccl/lib/libnccl-net.so"
                - name: PATH
                  value: "/opt/amazon/efa/bin:/opt/amazon/openmpi/bin:/usr/local/nvidia/bin:/usr/local/cuda/bin:/usr/local/bin:/usr/bin:/bin"
                - name: LD_LIBRARY_PATH
                  value: "/opt/amazon/efa/lib:/opt/amazon/openmpi/lib:/opt/aws-ofi-nccl/lib:/usr/local/nvidia/lib64:/usr/local/cuda/lib64:/usr/local/lib:/usr/lib"
                - name: PYTHONUNBUFFERED
                  value: "1"
                - name: OMP_NUM_THREADS
                  value: "8"
                - name: OMPI_MCA_plm_rsh_args
                  value: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
              command:
                - /bin/bash
                - -lc
                - |
                  set -eux
                  echo "===== deepep (nccl baseline) launcher ready ====="
                  for i in $(seq 1 60); do
                    NH=$(/etc/mpi/discover_hosts.sh 2>/dev/null | wc -l)
                    [ "$NH" -ge 2 ] && break
                    sleep 5
                  done
                  [ "$NH" -ge 2 ] || { echo FATAL; exit 1; }

                  HOSTFILE=/tmp/hostfile
                  : > $HOSTFILE
                  for h in $(/etc/mpi/discover_hosts.sh); do
                    echo "$h slots=8" >> $HOSTFILE
                  done
                  cat $HOSTFILE

                  for h in $(/etc/mpi/discover_hosts.sh); do
                    for i in $(seq 1 30); do
                      ssh -o StrictHostKeyChecking=no -o ConnectTimeout=2 "$h" hostname 2>/dev/null \
                        && { echo ssh OK $h; break; }
                      sleep 2
                    done
                  done

                  MASTER_HOST=$(head -1 "$HOSTFILE" | awk '{print $1}')
                  export MASTER_HOST
                  export MASTER_PORT=29500

                  mkdir -p /workspace/out

                  ENV_ARGS=(
                    -x PATH -x LD_LIBRARY_PATH
                    -x NCCL_DEBUG -x NCCL_DEBUG_SUBSYS
                    -x FI_PROVIDER -x FI_EFA_USE_DEVICE_RDMA -x FI_EFA_FORK_SAFE
                    -x NCCL_NET_PLUGIN
                    -x PYTHONUNBUFFERED -x OMP_NUM_THREADS
                    -x OMPI_ALLOW_RUN_AS_ROOT -x OMPI_ALLOW_RUN_AS_ROOT_CONFIRM
                    -x MASTER_HOST -x MASTER_PORT
                  )
                  MPI_COMMON=(
                    --allow-run-as-root
                    --hostfile "$HOSTFILE"
                    -np 16 -N 8
                    --mca pml ^ucx --mca btl ^openib
                    --mca plm_rsh_no_tree_spawn 1
                    --mca orte_keep_fqdn_hostnames 1
                    --mca oob_tcp_if_include eth0
                    --mca btl_tcp_if_include eth0
                    --bind-to none
                    "${ENV_ARGS[@]}"
                  )

                  echo "===== DeepEP internode bench: hidden=7168 topk=8 ====="
                  mpirun "${MPI_COMMON[@]}" \
                    bash /scripts/wrapper-internode.sh \
                    2>&1 | tee /workspace/out/nccl-perf-internode.log /hostlogs/nccl-perf-internode.log || echo "(internode exit non-zero)"

                  echo "===== DeepEP low-latency bench ====="
                  mpirun "${MPI_COMMON[@]}" \
                    bash /scripts/wrapper-ll.sh \
                    2>&1 | tee /workspace/out/nccl-perf-ll.log /hostlogs/nccl-perf-ll.log || echo "(ll exit non-zero)"

                  echo "===== DONE ====="
                  ls -la /hostlogs/ || true
                  sleep 60
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                - name: workspace
                  mountPath: /workspace
                - name: hostlogs
                  mountPath: /hostlogs
          volumes:
            - name: scripts
              configMap:
                name: uccl-ep-perf-nccl-script
                defaultMode: 0755
            - name: workspace
              emptyDir: {}
            - name: hostlogs
              hostPath:
                path: /var/lib/yanxi-logs/stage2
                type: Directory
    Worker:
      replicas: 2
      template:
        spec:
          restartPolicy: OnFailure
          hostNetwork: false
          dnsPolicy: ClusterFirstWithHostNet
          tolerations:
            - key: nvidia.com/gpu
              operator: Equal
              value: "true"
              effect: NoSchedule
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      training.kubeflow.org/job-name: uccl-ep-perf-nccl
                      training.kubeflow.org/job-role: worker
                  topologyKey: kubernetes.io/hostname
          containers:
            - name: worker
              image: 788668107894.dkr.ecr.us-east-2.amazonaws.com/yanxi/uccl-ep:v2
              imagePullPolicy: IfNotPresent
              env: *commonEnv
              securityContext:
                capabilities:
                  add: [IPC_LOCK]
              resources:
                limits:
                  nvidia.com/gpu: 8
                  vpc.amazonaws.com/efa: 16
                  hugepages-2Mi: 5120Mi
                  memory: 256Gi
                requests:
                  nvidia.com/gpu: 8
                  vpc.amazonaws.com/efa: 16
                  hugepages-2Mi: 5120Mi
                  memory: 256Gi
              volumeMounts:
                - name: shm
                  mountPath: /dev/shm
                - name: workspace
                  mountPath: /workspace
                - name: scripts
                  mountPath: /scripts
          volumes:
            - name: shm
              emptyDir:
                medium: Memory
                sizeLimit: 32Gi
            - name: workspace
              emptyDir: {}
            - name: scripts
              configMap:
                name: uccl-ep-perf-nccl-script
                defaultMode: 0755
